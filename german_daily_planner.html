<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch · Tagesplan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #F2EDE3;
  --paper-2: #E8E0D0;
  --paper-3: #FAF6EC;
  --ink: #1C1A17;
  --ink-soft: #4A453D;
  --line: #BFB5A0;
  --accent: #B5512A;
  --accent-2: #8C3F1F;
  --green: #4A7C3A;
  --gold: #C5963B;
  --serif: 'Fraunces', Georgia, serif;
  --sans: 'Manrope', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; line-height: 1.5; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
.serif { font-family: var(--serif); }
.container { max-width: 820px; margin: 0 auto; padding: 0 24px; }
.uppercase-mini { font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em; color: var(--ink-soft); }
.num { font-variant-numeric: tabular-nums; }

header { border-bottom: 1px solid var(--line); padding: 28px 0 22px; }
.title-cat { color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 0.3em; }
h1 { font-family: var(--serif); font-size: 44px; font-weight: 300; margin-top: 4px; letter-spacing: -0.02em; line-height: 1; }
h1 em { color: var(--accent); font-style: italic; }
.subtitle { font-family: var(--serif); font-style: italic; font-size: 16px; color: var(--ink-soft); margin-top: 6px; }

.prog-section { padding: 22px 0 6px; }
.prog-head { display: flex; justify-content: space-between; font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--ink-soft); margin-bottom: 8px; }
.prog-bar { height: 12px; background: var(--paper-2); border: 1px solid var(--line); position: relative; }
.prog-fill { height: 100%; background: var(--accent); transition: width 0.4s; }

main { padding: 26px 0 60px; }

/* DAY CARD */
.day-card { border: 2px solid var(--ink); background: var(--paper-3); }
.day-top { display: flex; align-items: center; gap: 20px; padding: 22px 26px; border-bottom: 1px solid var(--line); }
.day-num { font-family: var(--serif); font-size: 52px; font-weight: 300; color: var(--accent); line-height: 1; }
.day-num small { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--ink-soft); font-family: var(--sans); margin-top: 4px; }
.day-week { flex: 1; }
.day-week-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--ink-soft); }
.day-week-theme { font-family: var(--serif); font-size: 22px; margin-top: 2px; }
.day-done-badge { background: var(--green); color: var(--paper); font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; padding: 6px 12px; }

.day-body { padding: 24px 26px; }
.grammar-focus { background: var(--paper-2); padding: 12px 16px; border-radius: 2px; margin-bottom: 22px; }
.grammar-focus .uppercase-mini { margin-bottom: 4px; }
.grammar-focus-text { font-family: var(--serif); font-size: 17px; }

.task-block { margin-bottom: 22px; }
.task-label-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.task-badge { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; padding: 4px 10px; background: var(--accent); color: var(--paper); border-radius: 2px; }
.task-badge.review { background: var(--ink); }
.task-main { font-family: var(--serif); font-size: 24px; font-weight: 400; line-height: 1.3; }

.habits { border-top: 1px solid var(--line); padding-top: 18px; }
.habits .uppercase-mini { margin-bottom: 10px; }
.habit { display: flex; gap: 10px; align-items: flex-start; padding: 4px 0; font-size: 15px; }
.habit-dot { color: var(--accent); margin-top: 2px; }

.day-actions { display: flex; gap: 10px; padding: 0 26px 26px; flex-wrap: wrap; }
.btn { padding: 14px 22px; border: 1px solid var(--ink); font-size: 14px; transition: all 0.15s; display: inline-flex; gap: 8px; align-items: center; justify-content: center; white-space: nowrap; }
.btn:hover { background: var(--ink); color: var(--paper); }
.btn.copy { flex: 1; min-width: 240px; background: var(--accent); color: var(--paper); border-color: var(--accent); font-weight: 600; font-size: 15px; }
.btn.copy:hover { background: var(--accent-2); border-color: var(--accent-2); }
.btn.copy.copied { background: var(--green); border-color: var(--green); }
.btn.done { background: var(--ink); color: var(--paper); }
.btn.done:hover { background: var(--accent); border-color: var(--accent); }
.btn.done.is-done { background: transparent; color: var(--ink-soft); border-color: var(--line); }

/* NAV */
.nav-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 22px; flex-wrap: wrap; }
.nav-btn { padding: 10px 16px; border: 1px solid var(--line); font-size: 13px; transition: all 0.15s; }
.nav-btn:hover:not(:disabled) { border-color: var(--ink); background: var(--ink); color: var(--paper); }
.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.nav-center { display: flex; gap: 8px; align-items: center; }
.jump-select { padding: 9px 12px; border: 1px solid var(--line); background: var(--paper); font-family: inherit; font-size: 13px; }
.today-link { font-size: 12px; color: var(--accent); text-decoration: underline; text-underline-offset: 3px; cursor: pointer; }

.info-box { background: var(--paper-3); border-left: 3px solid var(--accent); padding: 14px 18px; margin-top: 26px; font-size: 14px; color: var(--ink-soft); line-height: 1.6; }
.info-box b { color: var(--ink); }

footer { border-top: 1px solid var(--line); padding: 18px 0; margin-top: 36px; }
.f-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; font-size: 12px; color: var(--ink-soft); }

/* user bar */
.user-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
.user-email { font-size: 12px; color: var(--ink-soft); }
.btn-logout { font-size: 12px; color: var(--accent); text-decoration: underline; text-underline-offset: 3px; cursor: pointer; background: none; border: none; font-family: inherit; }
.btn-logout:hover { color: var(--accent-2); }
.nav-tabs { display: flex; gap: 8px; }
.nav-tab { font-size: 12px; padding: 5px 14px; border: 1px solid var(--line); color: var(--ink-soft); text-decoration: none; transition: all 0.15s; }
.nav-tab:hover { border-color: var(--ink); color: var(--ink); }
.nav-tab.active { border-color: var(--ink); background: var(--ink); color: var(--paper); }
.lang-switcher { display: flex; gap: 4px; }
.lang-btn { font-size: 11px; padding: 3px 8px; border: 1px solid var(--line); color: var(--ink-soft); background: none; font-family: inherit; cursor: pointer; letter-spacing: 0.05em; }
.lang-btn:hover { border-color: var(--ink); color: var(--ink); }
.lang-btn.active { border-color: var(--ink); background: var(--ink); color: var(--paper); }

/* toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--paper); padding: 14px 24px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
.toast.show { opacity: 1; }

@media (max-width: 600px) {
  h1 { font-size: 34px; }
  .day-num { font-size: 40px; }
  .day-week-theme { font-size: 18px; }
  .task-main { font-size: 20px; }
  .day-top { flex-wrap: wrap; gap: 12px; }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="i18n.js"></script>
</head>

  ]},
  { n:23, theme:"Экзамен: Lesen + Hören", grammar:"Стратегии чтения и аудирования", vocab:"B1 критичный набор", tasks:[
    ["review","Полный пробник Goethe B1 — Lesen (65 минут, в условиях экзамена)"],
    ["review","Полный пробник Goethe B1 — Hören (40 минут)"],
    ["review","Разбор всех ошибок: каждое незнакомое слово → в тренажёр"],
    ["listen","Ещё один пробник Hören из другого источника (telc / ÖSD)"],
    ["read","Ещё один пробник Lesen (telc / ÖSD)"],
  ]},
  { n:24, theme:"Экзамен: Schreiben + Sprechen", grammar:"Шаблоны писем и презентаций", vocab:"Redemittel B1 — связки", tasks:[
    ["review","Schreiben Teil 1 — формальный email: выучить 3 шаблона структуры"],
    ["review","Schreiben Teil 2 + 3 — форум-пост и полуформальное письмо"],
    ["review","Sprechen Teil 1 — планирование совместного мероприятия с партнёром"],
    ["review","Sprechen Teil 2 — презентация на 3 минуты: подготовить 5 универсальных тем"],
    ["review","Sprechen Teil 3 — реакция + 2 вопроса; финальная репетиция всех частей"],
  ]},
];

const TYPE_LABEL = {
  test: "Диагностика", grammar: "Грамматика", listen: "Аудирование",
  write: "Письмо", speak: "Говорение", read: "Чтение", review: "Повторение / Экзамен"
};

/* Flatten weeks into days (one task = one day) */
const DAYS = [];
WEEKS.forEach(w => {
  w.tasks.forEach(([type, text]) => {
    DAYS.push({
      day: DAYS.length + 1,
      week: w.n,
      weekTheme: w.theme,
      grammar: w.grammar,
      vocab: w.vocab,
      type, text
    });
  });
});
const TOTAL_DAYS = DAYS.length;

/* ==========================================================================
   STATE
   ========================================================================== */
let state = { currentDay: 1, viewingDay: 1, completed: {} };
const KEY = 'de-tagesplan-v1';

/* ---- SUPABASE CONFIG: замени на свои значения из Settings → API ---- */
const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
/* -------------------------------------------------------------------- */
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;

async function initApp() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    localStorage.setItem('auth_redirect', location.href);
    location.href = 'auth.html';
    return;
  }
  currentUser = session.user;

  // Load from localStorage first (fast)
  try {
    const s = localStorage.getItem(KEY);
    if (s) {
      const d = JSON.parse(s);
      state.currentDay = d.currentDay || 1;
      state.viewingDay = state.currentDay;
      state.completed = d.completed || {};
    }
  } catch(e){}

  // Sync from cloud (overwrites local if cloud record exists)
  try {
    const { data } = await sb.from('progress')
      .select('planner_data, lang')
      .eq('user_id', session.user.id)
      .single();
    if (data && data.planner_data) {
      const d = data.planner_data;
      state.currentDay = d.currentDay || 1;
      state.completed = d.completed || {};
      state.viewingDay = state.currentDay;
      try { localStorage.setItem(KEY, JSON.stringify({ currentDay: state.currentDay, completed: state.completed })); } catch(e){}
    }
    if (data && data.lang) setLang(data.lang, true);
  } catch(e) { /* offline or no record yet — localStorage is fine */ }

  render();
}

function load() {
  try {
    const s = localStorage.getItem(KEY);
    if (s) {
      const d = JSON.parse(s);
      state.currentDay = d.currentDay || 1;
      state.viewingDay = state.currentDay;
      state.completed = d.completed || {};
    }
  } catch(e){}
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify({ currentDay: state.currentDay, completed: state.completed })); } catch(e){}
  saveToCloud();
}
async function saveToCloud() {
  if (!currentUser) return;
  try {
    await sb.from('progress').upsert({
      user_id: currentUser.id,
      planner_data: { currentDay: state.currentDay, completed: state.completed },
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id' });
  } catch(e) { /* ignore — localStorage is the fallback */ }
}
async function saveLangToCloud(code) {
  if (!currentUser) return;
  try {
    await sb.from('progress').upsert({
      user_id: currentUser.id,
      lang: code,
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id' });
  } catch(e) {}
}
async function logout() {
  await sb.auth.signOut();
  location.href = 'auth.html';
}

function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ==========================================================================
   CLIPBOARD TEXT
   ========================================================================== */
function buildPlanText(d) {
  return `${T('planner_clip_header', d.day, TOTAL_DAYS, d.week)}
${T('planner_clip_week_theme')}: ${d.weekTheme}
${T('planner_clip_grammar')}: ${d.grammar}

📋 ${T('planner_clip_task')} — [${T('type_'+d.type)}]:
${d.text}

${T('planner_clip_daily')}:
${T('planner_clip_vocab', d.week, d.vocab)}

${T('planner_clip_prompt')}`;
}

function copyPlan(day) {
  const d = DAYS[day - 1];
  const text = buildPlanText(d);
  const onOk = () => {
    showToast(T('planner_toast_copied'));
    const btn = document.getElementById('copyBtn');
    if (btn) { btn.classList.add('copied'); btn.textContent = T('planner_copied'); setTimeout(render, 1400); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onOk).catch(() => fallbackCopy(text, onOk));
  } else {
    fallbackCopy(text, onOk);
  }
}
function fallbackCopy(text, onOk) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); onOk(); }
  catch(e) { showToast(T('planner_toast_copy_fail')); }
  document.body.removeChild(ta);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

/* ==========================================================================
   ACTIONS
   ========================================================================== */
function goDay(n) {
  state.viewingDay = Math.max(1, Math.min(TOTAL_DAYS, n));
  render();
}
function goToCurrent() { state.viewingDay = state.currentDay; render(); }
function jumpWeek(weekNum) {
  const firstDay = DAYS.find(d => d.week === +weekNum);
  if (firstDay) { state.viewingDay = firstDay.day; render(); }
}
function toggleDone(day) {
  if (state.completed[day]) {
    delete state.completed[day];
  } else {
    state.completed[day] = true;
    if (day === state.currentDay && state.currentDay < TOTAL_DAYS) {
      state.currentDay++;
      state.viewingDay = state.currentDay;
    }
  }
  save(); render();
}

/* ==========================================================================
   RENDER
   ========================================================================== */
function render() {
  const d = DAYS[state.viewingDay - 1];
  const doneCount = Object.values(state.completed).filter(Boolean).length;
  const pct = Math.round(doneCount / TOTAL_DAYS * 100);
  const isDone = !!state.completed[d.day];
  const isViewingCurrent = state.viewingDay === state.currentDay;

  const weekOptions = WEEKS.map(w =>
    `<option value="${w.n}" ${w.n === d.week ? 'selected' : ''}>${T('planner_week_option', w.n, esc(w.theme))}</option>`
  ).join('');

  document.getElementById('app').innerHTML = `
<header>
  <div class="container">
    <div class="title-cat">${T('planner_title_cat')}</div>
    <h1>Tages<em>plan</em></h1>
    <div class="subtitle">${T('planner_subtitle')}</div>
    <div class="user-bar">
      <div class="nav-tabs">
        <a class="nav-tab active" href="german_daily_planner.html">${T('nav_planner')}</a>
        <a class="nav-tab" href="german_vocab_trainer.html">${T('nav_vocab')}</a>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="lang-switcher">${renderLangSwitcher()}</div>
        <span class="user-email">${esc(currentUser ? currentUser.email : '')}</span>
        <button class="btn-logout" onclick="logout()">${T('logout')}</button>
      </div>
    </div>
  </div>
</header>

<section class="container prog-section">
  <div class="prog-head">
    <span>${T('planner_progress', doneCount, TOTAL_DAYS)}</span>
    <span>${pct}%</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
</section>

<main class="container">
  <div class="day-card">
    <div class="day-top">
      <div class="day-num num">${d.day}<small>${T('planner_day_of', TOTAL_DAYS)}</small></div>
      <div class="day-week">
        <div class="day-week-label">${T('planner_week', d.week)}</div>
        <div class="day-week-theme">${esc(d.weekTheme)}</div>
      </div>
      ${isDone ? `<div class="day-done-badge">${T('planner_done_badge')}</div>` : ''}
    </div>

    <div class="day-body">
      <div class="grammar-focus">
        <div class="uppercase-mini">${T('planner_grammar_week')}</div>
        <div class="grammar-focus-text">${esc(d.grammar)}</div>
      </div>

      <div class="task-block">
        <div class="task-label-row">
          <span class="task-badge ${d.type === 'review' ? 'review' : ''}">${T('type_'+d.type)}</span>
          <span class="uppercase-mini">${T('planner_task_today')}</span>
        </div>
        <div class="task-main">${esc(d.text)}</div>
      </div>

      <div class="habits">
        <div class="uppercase-mini">${T('planner_daily_also')}</div>
        <div class="habit"><span class="habit-dot">●</span><span>${T('planner_vocab_habit', d.week, esc(d.vocab))}</span></div>
      </div>
    </div>

    <div class="day-actions">
      <button class="btn copy" id="copyBtn" onclick="copyPlan(${d.day})">${T('planner_copy')}</button>
      <button class="btn done ${isDone ? 'is-done' : ''}" onclick="toggleDone(${d.day})">${isDone ? T('planner_undo') : T('planner_done')}</button>
    </div>
  </div>

  <div class="nav-row">
    <button class="nav-btn" onclick="goDay(${d.day - 1})" ${d.day <= 1 ? 'disabled' : ''}>${T('planner_prev')}</button>
    <div class="nav-center">
      <select class="jump-select" onchange="jumpWeek(this.value)">${weekOptions}</select>
    </div>
    <button class="nav-btn" onclick="goDay(${d.day + 1})" ${d.day >= TOTAL_DAYS ? 'disabled' : ''}>${T('planner_next')}</button>
  </div>
  ${!isViewingCurrent ? `<div style="text-align:center;margin-top:14px"><span class="today-link" onclick="goToCurrent()">${T('planner_back_current', state.currentDay)}</span></div>` : ''}

  <div class="info-box">${T('planner_how_to')}</div>
</main>

<footer>
  <div class="container f-row">
    <span>${T('planner_footer')} · ${esc(currentUser ? currentUser.email : '')}</span>
    <span style="font-family:var(--serif);font-style:italic">«Schritt für Schritt»</span>
  </div>
</footer>
  `;
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowLeft') goDay(state.viewingDay - 1);
  else if (e.key === 'ArrowRight') goDay(state.viewingDay + 1);
  else if (e.key === 'c' || e.key === 'C' || e.key === 'с' || e.key === 'С') copyPlan(state.viewingDay);
});

initApp();
</script>
</body>
</html>
