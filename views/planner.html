<script>
/* ==========================================================================
   CURRICULUM (24 weeks) lives in data/weeks.js (global `WEEKS`).
   Task-type labels come from the `type_<type>` UI key (see locales/*.ui).
   ========================================================================== */

/* Flatten weeks into days (one task = one day) */
const DAYS = [];
WEEKS.forEach(w => {
  w.tasks.forEach(([type, text], taskIdx) => {
    DAYS.push({
      day: DAYS.length + 1,
      week: w.n,
      weekTheme: w.theme,
      grammar: w.grammar,
      vocab: w.vocab,
      type, text, taskIdx
    });
  });
});
const TOTAL_DAYS = DAYS.length;

/* Return a day object with content translated to the active UI language */
function getLocalizedDay(d) {
  const localeObj = window['LOCALE_' + getLang().toUpperCase()] || window.LOCALE_EN || {};
  const weekLoc = (localeObj.weeks || {})[d.week];
  if (!weekLoc) return d;
  return {
    ...d,
    weekTheme: weekLoc.theme   || d.weekTheme,
    grammar:   weekLoc.grammar || d.grammar,
    vocab:     weekLoc.vocab   || d.vocab,
    text:      (weekLoc.tasks && weekLoc.tasks[d.taskIdx] != null) ? weekLoc.tasks[d.taskIdx] : d.text,
  };
}

/* ==========================================================================
   AI CHAT — Gemini, user-provided key. Lessons are per-day and synced to the
   `lessons` table (see cloud-sync.js). Weekly summary uses the PRO model.
   ========================================================================== */
let lessonsCache = {};   // { day: [ {role,text}, ... ] }
let summaryCache = {};   // { week: [ {role,text}, ... ] }
let chatState = { loading: false, showKeyModal: false, summaryWeek: null };

/* getGeminiKey() + geminiRequest() live in assets/js/gemini.js (shared with collections.html). */
function _storeGeminiKey(k) {
  if (k) localStorage.setItem('gemini_key', k.trim());
  else localStorage.removeItem('gemini_key');
}
/* Whether the user opted to keep the key on their account (synced across devices). */
function keySynced() { return localStorage.getItem('gemini_key_sync') === '1'; }
function _setKeySync(on) {
  if (on) localStorage.setItem('gemini_key_sync', '1');
  else localStorage.removeItem('gemini_key_sync');
}

/* Called by cloud-sync.initApp when the account carries a saved key — adopt it locally so this
   device works without re-pasting; clear the synced flag if the account no longer has one. */
function applyCloudKey(key) {
  if (key) { _storeGeminiKey(key); _setKeySync(true); }
  else _setKeySync(false);
}

function saveGeminiKeyAndClose() {
  const inp = document.getElementById('geminiKeyInput');
  const syncEl = document.getElementById('geminiKeySync');
  const key = inp ? inp.value.trim() : '';
  const wantSync = !!(syncEl && syncEl.checked) && !!key;
  const wasSynced = keySynced();
  _storeGeminiKey(key);
  _setKeySync(wantSync);
  if (typeof saveGeminiKeyToCloud === 'function') {
    if (wantSync) saveGeminiKeyToCloud(key);            // keep the account copy in sync
    else if (wasSynced) saveGeminiKeyToCloud('');       // opted out → wipe the account copy
  }
  chatState.showKeyModal = false;
  render();
}
function removeGeminiKey() {
  const wasSynced = keySynced();
  _storeGeminiKey('');
  _setKeySync(false);
  if (wasSynced && typeof saveGeminiKeyToCloud === 'function') saveGeminiKeyToCloud('');
  chatState.showKeyModal = false;
  render();
}
function openKeyModal()  { chatState.showKeyModal = true;  render(); }
function closeKeyModal() { chatState.showKeyModal = false; render(); }
function clearChat(day) {
  delete lessonsCache[day];
  deleteLessonFromCloud(day);
  render();
}

function getDayMessages(day) { return lessonsCache[day] || []; }
function isWeekComplete(week) {
  return DAYS.filter(d => d.week === week).every(d => state.completed[d.day]);
}

/* Load all lessons + summaries from cloud, then re-render. */
async function loadLessonsThenRender() {
  const rows = await loadLessonsFromCloud();
  rows.forEach(r => {
    if (r.day < 0) summaryCache[-r.day] = r.messages || [];
    else lessonsCache[r.day] = r.messages || [];
  });
  render();
}

/* geminiRequest(model, systemPrompt, messages) lives in assets/js/gemini.js (shared). */

async function startAILesson(day) {
  const d = getLocalizedDay(DAYS[day - 1]);
  lessonsCache[day] = [{ role: 'user', text: buildPlanText(d) }];
  chatState.loading = true;
  render();
  await runLessonTurn(day);
}

async function sendChatMessage(day) {
  const inp = document.getElementById('chatInput');
  const text = inp ? inp.value.trim() : '';
  if (!text || chatState.loading) return;
  if (!lessonsCache[day]) lessonsCache[day] = [];
  lessonsCache[day].push({ role: 'user', text });
  chatState.loading = true;
  render();
  await runLessonTurn(day);
}

async function runLessonTurn(day) {
  try {
    const reply = await geminiRequest(AI_MODEL_ID, getAiSystemPrompt(), lessonsCache[day]);
    lessonsCache[day].push({ role: 'model', text: reply });
    saveLessonToCloud(day, lessonsCache[day]);
  } catch (e) {
    showToast(e.message || T('ai_error'));
  } finally {
    chatState.loading = false;
    render();
    scrollChatToBottom();
  }
}

/* ---- Weekly summary (PRO model) ---------------------------------------- */
function buildWeekTranscript(week) {
  const parts = [];
  DAYS.filter(d => d.week === week).forEach(d => {
    const msgs = lessonsCache[d.day];
    if (!msgs || !msgs.length) return;
    parts.push('### Day ' + d.day + ' (' + d.type + ')');
    msgs.forEach(m => parts.push((m.role === 'model' ? 'TUTOR:' : 'STUDENT:') + ' ' + m.text));
  });
  return parts.join('\n\n');
}

function viewWeeklySummary(week) { chatState.summaryWeek = week; render(); }
function closeSummary() { chatState.summaryWeek = null; render(); }

async function generateWeeklySummary(week) {
  const transcript = buildWeekTranscript(week);
  if (!transcript) { showToast(T('ai_summary_empty')); return; }
  summaryCache[week] = [{ role: 'user', text: transcript }];
  chatState.loading = true;
  chatState.summaryWeek = week;
  render();
  try {
    const reply = await geminiRequest(AI_PRO_MODEL_ID, getAiSummaryPrompt(), summaryCache[week]);
    summaryCache[week].push({ role: 'model', text: reply });
    saveLessonToCloud(-week, summaryCache[week]);
  } catch (e) {
    showToast(e.message || T('ai_error'));
    chatState.summaryWeek = null;
  } finally {
    chatState.loading = false;
    render();
    scrollChatToBottom();
  }
}

function summaryHasReply(week) {
  const m = summaryCache[week];
  return !!(m && m.length && m[m.length - 1].role === 'model');
}

function scrollChatToBottom() {
  setTimeout(() => { const el = document.getElementById('chatInput'); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'end' }); }, 30);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function inlineMd(s) {
  let h = escHtml(s);
  // Links — only http(s)/mailto are allowed (blocks javascript:/data: injection). Markdown links
  // are parsed first and parked as placeholders so the bare-URL autolinker can't double-wrap them.
  const safeUrl = (u) => /^(https?:\/\/|mailto:)/i.test(u.replace(/&amp;/g, '&')) ? u : null;
  const links = [];
  const park = (anchor) => { links.push(anchor); return '\u0000' + (links.length - 1) + '\u0000'; };
  h = h.replace(/\[([^\]]+)\]\(((?:https?:\/\/|mailto:)[^\s)]+)\)/gi, (m, text, url) => {
    const safe = safeUrl(url);
    return safe ? park(`<a href="${safe}" target="_blank" rel="noopener noreferrer">${text}</a>`) : m;
  });
  h = h.replace(/(^|[\s(])(https?:\/\/[^\s<]+)/gi, (m, pre, url) => {
    const trail = (url.match(/[.,;:!?)\]]+$/) || [''])[0];
    const clean = url.slice(0, url.length - trail.length);
    return pre + park(`<a href="${clean}" target="_blank" rel="noopener noreferrer">${clean}</a>`) + trail;
  });
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*([^*\n]+)\*/g,  '<em>$1</em>');
  h = h.replace(/`([^`\n]+)`/g,     '<code>$1</code>');
  h = h.replace(/\u0000(\d+)\u0000/g, (m, idx) => links[+idx]);
  return h;
}
function renderMdTable(lines) {
  const rows = lines.filter(l => !/^\|[\s\-:|]+\|?$/.test(l.trim()));
  if (!rows.length) return '';
  let out = '<table class="ai-table">';
  rows.forEach((row, idx) => {
    const cells = row.split('|').slice(1, -1);
    const tag = idx === 0 ? 'th' : 'td';
    out += '<tr>' + cells.map(c => `<${tag}>${inlineMd(c.trim())}</${tag}>`).join('') + '</tr>';
  });
  return out + '</table>';
}
function renderMd(text) {
  const lines = text.split('\n');
  let html = '';
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    // Table block
    if (line.trimStart().startsWith('|')) {
      const tbl = [];
      while (i < lines.length && lines[i].trimStart().startsWith('|')) { tbl.push(lines[i]); i++; }
      html += renderMdTable(tbl);
      continue;
    }
    // Headings
    const hm = line.match(/^(#{1,4}) (.+)$/);
    if (hm) {
      const lvl = Math.min(hm[1].length + 2, 6);
      html += `<h${lvl} class="ai-h">${inlineMd(hm[2])}</h${lvl}>`;
      i++; continue;
    }
    // HR
    if (/^---+$/.test(line.trim())) { html += '<hr class="ai-hr">'; i++; continue; }
    // Unordered list
    if (/^[-*\u2022] /.test(line)) {
      let items = '';
      while (i < lines.length && /^[-*\u2022] /.test(lines[i])) {
        items += '<li>' + inlineMd(lines[i].replace(/^[-*\u2022] /, '')) + '</li>';
        i++;
      }
      html += '<ul class="ai-ul">' + items + '</ul>';
      continue;
    }
    // Ordered list
    if (/^\d+\. /.test(line)) {
      let items = '';
      while (i < lines.length && /^\d+\. /.test(lines[i])) {
        items += '<li>' + inlineMd(lines[i].replace(/^\d+\. /, '')) + '</li>';
        i++;
      }
      html += '<ol class="ai-ol">' + items + '</ol>';
      continue;
    }
    // Empty line
    if (line.trim() === '') { html += '<div class="ai-br"></div>'; i++; continue; }
    // Paragraph
    html += '<p class="ai-p">' + inlineMd(line) + '</p>';
    i++;
  }
  return html;
}

function renderKeyModal() {
  const cur = esc(getGeminiKey());
  return `<div class="ai-key-bg" onclick="if(event.target===this)closeKeyModal()">
  <div class="ai-key-box">
    <h3>${T('ai_key_title')}</h3>
    <p>${T('ai_key_desc')}</p>
    <input id="geminiKeyInput" class="ai-key-input" type="password"
      placeholder="${T('ai_key_placeholder')}" value="${cur}"
      onkeydown="if(event.key==='Enter')saveGeminiKeyAndClose()">
    <label class="ai-key-sync">
      <input type="checkbox" id="geminiKeySync" ${keySynced() ? 'checked' : ''}>
      <span>${T('ai_key_sync_label')}</span>
    </label>
    <div class="ai-key-sync-hint">${T('ai_key_sync_hint')}</div>
    <div class="ai-key-actions">
      <button class="btn done" onclick="saveGeminiKeyAndClose()">${T('ai_key_save')}</button>
      <button class="btn" onclick="closeKeyModal()">${T('ai_key_cancel')}</button>
      ${getGeminiKey() ? `<button class="btn" style="margin-left:auto;color:var(--die)" onclick="removeGeminiKey()">${T('ai_key_remove')}</button>` : ''}
    </div>
  </div>
</div>`;
}

function renderSummaryModal() {
  const week = chatState.summaryWeek;
  const msgs = summaryCache[week] || [];
  const reply = msgs.length && msgs[msgs.length - 1].role === 'model' ? msgs[msgs.length - 1].text : '';
  const body = chatState.loading
    ? `<div class="ai-thinking-dots"><span></span><span></span><span></span></div>`
    : (reply ? renderMd(reply) : '');
  return `<div class="ai-key-bg" onclick="if(event.target===this)closeSummary()">
  <div class="ai-key-box ai-summary-box">
    <div class="ai-summary-head">
      <h3>${T('ai_summary_title', week)}</h3>
      <button class="ai-link-btn" onclick="closeSummary()">✕</button>
    </div>
    <div class="ai-summary-body" id="chatMessages">${body}</div>
  </div>
</div>`;
}

function renderAiSection(d) {
  if (!getGeminiKey()) {
    return `<div class="ai-section ai-no-key-row">
  <span class="ai-no-key-text">${T('ai_no_key')}</span>
  <button class="ai-key-link" onclick="openKeyModal()">${T('ai_setup_key')}</button>
</div>`;
  }
  const msgs = getDayMessages(d.day);
  const weekDone = isWeekComplete(d.week);
  const summaryBtn = weekDone
    ? (summaryHasReply(d.week)
        ? `<button class="ai-link-btn" onclick="viewWeeklySummary(${d.week})">${T('ai_summary_view')}</button>`
        : `<button class="ai-link-btn" onclick="generateWeeklySummary(${d.week})">${T('ai_summary_make', d.week)}</button>`)
    : '';
  const header = `<div class="ai-chat-header">
    <span class="ai-chat-title">AI Lehrer · ${T('planner_week', d.week)}</span>
    <div class="ai-chat-actions">
      ${summaryBtn}
      ${msgs.length ? `<button class="ai-link-btn" onclick="clearChat(${d.day})">${T('ai_clear')}</button>` : ''}
      <button class="ai-link-btn ai-settings-btn" onclick="openKeyModal()">⚙</button>
    </div>
  </div>`;

  if (msgs.length === 0) {
    return `<div class="ai-section">
  ${header}
  <button class="btn done" onclick="startAILesson(${d.day})">${T('ai_start_lesson')}</button>
</div>`;
  }
  const msgsHtml = msgs.map(m =>
    `<div class="ai-msg ${m.role === 'model' ? 'model' : 'user'}">${m.role === 'model' ? renderMd(m.text) : esc(m.text)}</div>`
  ).join('');
  return `<div class="ai-section">
  ${header}
  <div class="ai-messages" id="chatMessages">
    ${msgsHtml}
    ${chatState.loading && chatState.summaryWeek === null ? '<div class="ai-msg model ai-loading"><div class="ai-thinking-dots"><span></span><span></span><span></span></div></div>' : ''}
  </div>
  <div class="ai-input-row">
    <textarea class="ai-input" id="chatInput" rows="1" placeholder="${T('ai_input_hint')}"
      ${chatState.loading ? 'disabled' : ''}
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage(${d.day});}"></textarea>
    <button class="ai-send" onclick="sendChatMessage(${d.day})" ${chatState.loading ? 'disabled' : ''}>${T('ai_send')}</button>
  </div>
</div>`;
}

/* ==========================================================================
   STATE
   ========================================================================== */
let state = { currentDay: 1, viewingDay: 1, completed: {} };

/* Cloud sync config — initApp / saveToCloud / saveLangToCloud / logout live in assets/js/cloud-sync.js */
const CLOUD_FIELD = 'planner_data';
function getCloudPayload(){ return { currentDay: state.currentDay, viewingDay: state.viewingDay, completed: state.completed }; }
function applyCloudData(d){
  state.currentDay = d.currentDay || 1;
  state.completed = d.completed || {};
  state.viewingDay = d.viewingDay || state.currentDay;
}

function save() { saveToCloud(); }

/* ==========================================================================
   CLIPBOARD TEXT
   ========================================================================== */
function buildPlanText(d) {
  return `${T('planner_clip_header', d.day, TOTAL_DAYS, d.week)}
${T('planner_clip_week_theme')}: ${d.weekTheme}
${T('planner_clip_grammar')}: ${d.grammar}

📋 ${T('planner_clip_task')} — [${T('type_'+d.type)}]:
${d.text}

${T('planner_clip_daily')}:
${T('planner_clip_vocab', d.week, d.vocab)}

${T('planner_clip_prompt')}`;
}

function focusLesson(day) {
  if (getDayMessages(day).length === 0) { startAILesson(day); return; }
  const el = document.getElementById('chatMessages');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyPlan(day) {
  const d = getLocalizedDay(DAYS[day - 1]);
  const text = buildPlanText(d);
  const onOk = () => {
    showToast(T('planner_toast_copied'));
    const btn = document.getElementById('copyBtn');
    if (btn) { btn.classList.add('copied'); btn.textContent = T('planner_copied'); setTimeout(render, 1400); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onOk).catch(() => fallbackCopy(text, onOk));
  } else {
    fallbackCopy(text, onOk);
  }
}
function fallbackCopy(text, onOk) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); onOk(); }
  catch(e) { showToast(T('planner_toast_copy_fail')); }
  document.body.removeChild(ta);
}

/* ==========================================================================
   ACTIONS
   ========================================================================== */
function goDay(n) {
  state.viewingDay = Math.max(1, Math.min(TOTAL_DAYS, n));
  save(); render();
}
function goToCurrent() { state.viewingDay = state.currentDay; save(); render(); }
function jumpWeek(weekNum) {
  const firstDay = DAYS.find(d => d.week === +weekNum);
  if (firstDay) { state.viewingDay = firstDay.day; save(); render(); }
}
function toggleDone(day) {
  if (state.completed[day]) {
    delete state.completed[day];
  } else {
    state.completed[day] = true;
    if (day === state.currentDay && state.currentDay < TOTAL_DAYS) {
      state.currentDay++;
      state.viewingDay = state.currentDay;
    }
  }
  save(); render();
}

/* ==========================================================================
   RENDER (composed from section builders below)
   ========================================================================== */
function renderHeader() {
  return appHeader('planner', { cat: 'planner_title_cat', h1: 'Tages<em>plan</em>', subtitle: 'planner_subtitle' });
}

function renderProgress(doneCount, pct) {
  return `
<section class="container prog-section">
  <div class="prog-head">
    <span>${T('planner_progress', doneCount, TOTAL_DAYS)}</span>
    <span>${pct}%</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
</section>`;
}

function renderDayCard(d, isDone) {
  return `
  <div class="day-card">
    <div class="day-top">
      <div class="day-num num">${d.day}<small>${T('planner_day_of', TOTAL_DAYS)}</small></div>
      <div class="day-week">
        <div class="day-week-label">${T('planner_week', d.week)}</div>
        <div class="day-week-theme">${esc(d.weekTheme)}</div>
      </div>
      ${isDone ? `<div class="day-done-badge">${T('planner_done_badge')}</div>` : ''}
    </div>

    <div class="day-body">
      <div class="grammar-focus">
        <div class="uppercase-mini">${T('planner_grammar_week')}</div>
        <div class="grammar-focus-text">${esc(d.grammar)}</div>
      </div>

      <div class="task-block">
        <div class="task-label-row">
          <span class="task-badge ${d.type === 'review' ? 'review' : ''}">${T('type_'+d.type)}</span>
          <span class="uppercase-mini">${T('planner_task_today')}</span>
        </div>
        <div class="task-main">${esc(d.text)}</div>
      </div>

      <div class="habits">
        <div class="uppercase-mini">${T('planner_daily_also')}</div>
        <div class="habit"><span class="habit-dot">●</span><span>${T('planner_vocab_habit', d.week, esc(d.vocab))}</span></div>
      </div>
    </div>

    <div class="day-actions">
      ${getGeminiKey()
        ? `<button class="btn ai-start" onclick="focusLesson(${d.day})">${T('ai_start_lesson')}</button>
      <button class="btn copy small" id="copyBtn" onclick="copyPlan(${d.day})">${T('planner_copy_short')}</button>`
        : `<button class="btn copy" id="copyBtn" onclick="copyPlan(${d.day})">${T('planner_copy')}</button>`}
      <button class="btn done ${isDone ? 'is-done' : ''}" onclick="toggleDone(${d.day})">${isDone ? T('planner_undo') : T('planner_done')}</button>
    </div>
  </div>`;
}

function renderNav(d, isViewingCurrent) {
  const weekOptions = WEEKS.map(w => {
    const localeObj = window['LOCALE_' + getLang().toUpperCase()] || window.LOCALE_EN || {};
    const wLoc = (localeObj.weeks || {})[w.n];
    const theme = (wLoc && wLoc.theme) || w.theme;
    return `<option value="${w.n}" ${w.n === d.week ? 'selected' : ''}>${T('planner_week_option', w.n, esc(theme))}</option>`;
  }).join('');

  return `
  <div class="nav-row">
    <button class="nav-btn" onclick="goDay(${d.day - 1})" ${d.day <= 1 ? 'disabled' : ''}>${T('planner_prev')}</button>
    <div class="nav-center">
      <select class="jump-select" onchange="jumpWeek(this.value)">${weekOptions}</select>
    </div>
    <button class="nav-btn" onclick="goDay(${d.day + 1})" ${d.day >= TOTAL_DAYS ? 'disabled' : ''}>${T('planner_next')}</button>
  </div>
  ${!isViewingCurrent ? `<div style="text-align:center;margin-top:14px"><span class="today-link" onclick="goToCurrent()">${T('planner_back_current', state.currentDay)}</span></div>` : ''}`;
}

function renderFooter() {
  return `
<footer>
  <div class="container f-row">
    <span>${T('planner_footer')} · ${esc(currentUser ? currentUser.email : '')} · <a class="gh-link" href="https://github.com/mic-2000/deutsch-daily" target="_blank" rel="noopener">GitHub</a></span>
    <span style="font-family:var(--serif);font-style:italic">«Schritt für Schritt»</span>
  </div>
</footer>`;
}

function render() {
  const d = getLocalizedDay(DAYS[state.viewingDay - 1]);
  const doneCount = Object.values(state.completed).filter(Boolean).length;
  const pct = Math.round(doneCount / TOTAL_DAYS * 100);
  const isDone = !!state.completed[d.day];
  const isViewingCurrent = state.viewingDay === state.currentDay;

  let html = `${renderHeader()}
${renderProgress(doneCount, pct)}

<main class="container">
  ${renderDayCard(d, isDone)}
  ${renderNav(d, isViewingCurrent)}

  ${!getGeminiKey() ? `<div class="info-box">${T('planner_how_to')}</div>` : ''}
  ${renderAiSection(d)}
</main>
${renderFooter()}
  `;
  if (chatState.showKeyModal) html += renderKeyModal();
  if (chatState.summaryWeek !== null) html += renderSummaryModal();
  document.getElementById('app').innerHTML = html;
  // Only follow the chat to the bottom while a turn is in flight (start/send a message);
  // plain navigation/toggles shouldn't yank the viewport down into the chat.
  if (chatState.loading) scrollChatToBottom();
}

document.addEventListener('keydown', e => {
  // Don't hijack typing in a form field (chat textarea, API-key input) or the week dropdown.
  const tag = e.target.tagName;
  if (tag === 'SELECT' || tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable) return;
  // A modal owns the keyboard while it's open.
  if (chatState.showKeyModal || chatState.summaryWeek !== null) return;
  if (e.key === 'ArrowLeft') goDay(state.viewingDay - 1);
  else if (e.key === 'ArrowRight') goDay(state.viewingDay + 1);
  else if (e.key === 'c' || e.key === 'C' || e.key === 'с' || e.key === 'С') copyPlan(state.viewingDay);
});

// Paint the shell right away in the saved language (locale is a fast static file) so the
// header/nav don't blank out on every section switch; initApp() re-renders with cloud data.
loadLocale(getLang()).then(() => { try { render(); } catch (_) {} });
initApp().then(loadLessonsThenRender);
</script>
</body>
</html>
