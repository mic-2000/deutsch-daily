<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ==========================================================================
   /vocab — thin host around the shared VocabTrainer engine (assets/js/vocab-trainer.js).
   The engine owns all trainer logic + state; this page only wires the cloud-sync contract
   (CLOUD_FIELD / getCloudPayload / applyCloudData / applyVerbProgress / render) and the
   keyboard listener, then boots. VOCAB (36 weeks) lives in data/vocab.js.
   ========================================================================== */
const CLOUD_FIELD = 'vocab_data';
function getCloudPayload(){ return VocabTrainer.serialize(); }
function applyCloudData(d){ VocabTrainer.applyData(d); }
function applyVerbProgress(d){ VocabTrainer.applyVerbProgress(d); }   // shared verbs_data store
function render(){ VocabTrainer.render(); }                          // cloud-sync calls render()

VocabTrainer.init({ embedded: false });   // home + sessions; saves default to saveToCloud / saveVerbsToCloud
document.addEventListener('keydown', VocabTrainer.handleKeydown);

// Paint the shell right away in the saved language (locale is a fast static file) so the
// header/nav don't blank out on every section switch; initApp() re-renders with cloud data.
// Gate 3: mixed-course-version cache → reload prompt instead of a drifted render.
loadLocale(getLang()).then(() => { try { if (courseVersionBlocked()) return; render(); } catch (_) {} });
if (courseVersionConsistent()) initApp();
</script>
