<div class="toast" id="toast"></div>

<script>
/* ==========================================================================
   /verbs — thin host around the shared VerbsTrainer engine (assets/js/verbs-trainer.js).
   The engine owns all trainer logic + state; this page only wires the cloud-sync contract
   (CLOUD_FIELD / getCloudPayload / applyCloudData / render) and the keyboard listener, then
   boots. Verb forms live in data/verbs.js (global VERBS); mastery is keyed by verb key in the
   shared `verbs_data` column.
   ========================================================================== */
const CLOUD_FIELD = 'verbs_data';
function getCloudPayload(){ return VerbsTrainer.serialize(); }
function applyCloudData(d){ VerbsTrainer.applyData(d); }
function render(){ VerbsTrainer.render(); }   // cloud-sync calls render()

VerbsTrainer.init({ embedded: false });   // home + sessions; saves default to saveToCloud
document.addEventListener('keydown', VerbsTrainer.handleKeydown);

// Paint the shell right away in the saved language (locale is a fast static file) so the
// header/nav don't blank out on every section switch; initApp() re-renders with cloud data.
loadLocale(getLang()).then(() => { try { render(); } catch (_) {} });
initApp();
</script>
