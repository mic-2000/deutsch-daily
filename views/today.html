<script>
/* ==========================================================================
   /today — the daily-flow wizard. Walks the user through ONE study day in order:
   grammar → words → verbs → AI tutor → done, with no manual navigation between
   sections. It hosts the SHARED engines (vocab-trainer.js / verbs-trainer.js) in
   `embedded` mode (sessions only, end screen advances the flow) and reuses the
   curriculum day model (planner-data.js). "Today" = the planner's currentDay.

   Cloud columns touched, each written independently (see cloud-sync.js):
     • planner_data — read currentDay, write completion on finish (this page's CLOUD_FIELD)
     • verbs_data   — ONE shared mastery map, mutated by both engines (wireSharedVerbStore)
     • vocab_data   — driven by the vocab engine (loaded after initApp, saved via saveVocabToCloud)
   The per-day AI tutor with persisted history lives on /planner; the AI step here is a
   lightweight in-flow chat (not persisted) so it can't clobber the planner's lesson rows.
   ========================================================================== */

/* ---- planner progress (this page owns planner_data via CLOUD_FIELD) ---- */
let planner = { currentDay: 1, viewingDay: 1, completed: {} };
const CLOUD_FIELD = 'planner_data';
function getCloudPayload(){ return planner; }
function applyCloudData(d){
  if (d && typeof d === 'object') {
    planner = Object.assign({ currentDay: 1, viewingDay: 1, completed: {} }, d);
    if (!planner.completed || typeof planner.completed !== 'object') planner.completed = {};
  }
}
function dayOf(){ return planner.currentDay; }
function activeDay(){ return flow.running ? flow.day : dayOf(); }   // the day the flow is on (== currentDay normally)
function localizedToday(){ return getLocalizedDay(DAYS[Math.min(activeDay(), TOTAL_DAYS) - 1]); }

/* Resume position across a page refresh — transient per-tab nav state (NOT progress; progress lives
   in the cloud). sessionStorage survives reload, clears on tab close — exactly "same step on refresh". */
function saveFlow(){ try { sessionStorage.setItem('today_flow', JSON.stringify({ step: flow.step, day: flow.day })); } catch (e) {} }
function clearFlow(){ try { sessionStorage.removeItem('today_flow'); } catch (e) {} }
function readFlow(){ try { return JSON.parse(sessionStorage.getItem('today_flow')); } catch (e) { return null; } }

/* ---- shared verbs_data store: both engines mutate ONE mastery map ---- */
function wireSharedVerbStore(){
  const map = (VerbsTrainer.state.mastery && typeof VerbsTrainer.state.mastery === 'object') ? VerbsTrainer.state.mastery : {};
  VerbsTrainer.setMasteryStore(map);
  VocabTrainer.setVerbStore({ mastery: map });
}
function applyVerbProgress(d){ VerbsTrainer.applyData(d && typeof d === 'object' ? d : { mastery: {} }); wireSharedVerbStore(); }

/* ---- engine persistence hooks (three independent columns) ---- */
function saveVerbsNow(){ if (typeof saveVerbsToCloud === 'function') saveVerbsToCloud(VerbsTrainer.serialize()); }
function saveVocabNow(){ if (typeof saveVocabToCloud === 'function') saveVocabToCloud(VocabTrainer.serialize()); }
VocabTrainer.init({ embedded: true, onSessionEnd: (r) => { flow.vocabResult = r; flow.results.vocab = { completed: !!(r && r.completed) }; nextStep(); }, onSaveVocab: saveVocabNow, onSaveVerbs: saveVerbsNow });
VerbsTrainer.init({ embedded: true, onSessionEnd: (r) => { flow.verbResult = r; flow.results.verbs = { completed: !!(r && r.completed) }; nextStep(); }, onSave: saveVerbsNow });

/* ==========================================================================
   FLOW — descriptor-driven. buildSteps() returns an ordered list of step
   descriptors for a given day; the engine walks the ENABLED ones in order and,
   at the done step, gates day-completion on the REQUIRED ones. This keeps the
   current blocks (grammar · words · verbs · AI · done) while making optional
   blocks, empty-state skips, and completion gates explicit — so later phases can
   add review/listen/produce and tariff logic by extending buildSteps() alone.
   ========================================================================== */

/* The user's onboarding profile (level / goal / minutes / hardest / language), or {} before it loads. */
function onboardingProfile(){ return (typeof userOnboarding !== 'undefined' && userOnboarding) ? userOnboarding : {}; }

/* buildSteps(day, onboarding) → ordered step descriptors, filtered to the enabled ones. Each:
     id          — stable block id; doubles as the locale-key stem (today_step_<id> / _sub)
     required    — the day counts as done only when every enabled required block isComplete()
     enabled     — whether the block appears in the flow at all (filtered out below when false)
     run()       — paints/starts the block; advances via nextStep() (or a trainer's onSessionEnd)
     isComplete()— completion predicate, read at the done step (backed by flow.results)
   Completion rules: AI never blocks the day; a trainer session worked to the end (or auto-skipped
   on an empty queue) counts complete; closing a trainer early leaves its block incomplete. */
function buildSteps(day, onboarding){
  return [
    { id: 'grammar', required: true,  enabled: true, run: renderGrammar,  isComplete: () => true },
    { id: 'vocab',   required: true,  enabled: true, run: startVocabStep, isComplete: () => !!(flow.results.vocab && flow.results.vocab.completed) },
    { id: 'verbs',   required: true,  enabled: true, run: startVerbsStep, isComplete: () => !!(flow.results.verbs && flow.results.verbs.completed) },
    { id: 'ai',      required: false, enabled: true, run: runAiStep,      isComplete: () => true },
    { id: 'done',    required: true,  enabled: true, run: renderDone,     isComplete: () => true },
  ].filter(step => step.enabled);
}

let flow = { running: false, step: 0, day: 1, steps: [], results: {} };
let ai = { messages: [], loading: false };
let grammarExplain = false;   // grammar step: AI breakdown panel expanded under the day card

function render(){ if (flow.running) renderStep(); else renderIntro(); }
function currentStep(){ return flow.steps[flow.step] || null; }
/* A day is finished when every enabled required descriptor reports complete (AI is not required). */
function dayComplete(){ return flow.steps.filter(s => s.required).every(s => s.isComplete()); }

function startFlow(){
  if (dayOf() > TOTAL_DAYS) return;
  ai = { messages: [], loading: false };
  grammarExplain = false;
  flow = { running: true, step: 0, day: dayOf(), steps: buildSteps(dayOf(), onboardingProfile()), results: {}, vocabResult: null, verbResult: null };
  renderStep();
  loadDayLesson(flow.day);   // pull any saved explanation/chat for this day (shared with the planner)
}

/* Load this day's AI lesson (same `lessons` row the planner uses) so a saved explanation reappears. */
async function loadDayLesson(day){
  try {
    const rows = (typeof loadLessonsFromCloud === 'function') ? await loadLessonsFromCloud() : [];
    const row = Array.isArray(rows) ? rows.find(r => r.day === day) : null;
    ai.messages = (row && Array.isArray(row.messages)) ? row.messages.slice() : [];
  } catch (e) { ai.messages = []; }
  if (ai.messages.length) grammarExplain = true;   // show the saved explanation right on the grammar card
  if (flow.running) render();
}
function exitFlow(){ flow.running = false; clearFlow(); if (window.speechSynthesis) window.speechSynthesis.cancel(); render(); }
function nextStep(){ flow.step = Math.min(flow.step + 1, flow.steps.length - 1); renderStep(); }

function renderStep(){
  saveFlow();   // remember where we are, so a refresh resumes the same step
  const step = currentStep();
  if (step) step.run();
}
/* AI step run(): paint the chat, then auto-generate the once-per-day summary if a key is present. */
function runAiStep(){ renderAi(); maybeSummarize(); }
/* Cap a session to the user's daily time budget (onboarding "minutes/day"); default = full 25. */
function sessionCap(){
  const m = (typeof userOnboarding !== 'undefined' && userOnboarding) ? userOnboarding.minutes : null;
  return { 5: 6, 10: 12, 15: 18, '20+': 25 }[m] || 25;
}
function trimSession(engine){ const s = engine.state.session; if (s && s.queue) { s.queue = s.queue.slice(0, sessionCap()); s.uniqueTotal = s.queue.length; } }
function startVocabStep(){
  // Daily review: due backlog from every reached week (incl. mastered-but-due) + new words from today's week.
  VocabTrainer.startSession({ type: 'daily', week: localizedToday().week });
  if (!VocabTrainer.state.session) { flow.results.vocab = { completed: true, skipped: true }; nextStep(); return; }   // empty queue → auto-skip, doesn't block the day
  trimSession(VocabTrainer); VocabTrainer.render();
}
function startVerbsStep(){
  VerbsTrainer.startSession({ type: 'due' });                          // repetition first
  if (!VerbsTrainer.state.session) VerbsTrainer.startSession({ type: 'filter', filter: 'all' }); // else due + some new
  if (!VerbsTrainer.state.session) { flow.results.verbs = { completed: true, skipped: true }; nextStep(); return; }   // nothing to train → auto-skip
  trimSession(VerbsTrainer); VerbsTrainer.render();
}

/* ---- shared in-flow header (progress) ---- */
function flowHeader(){
  const step = currentStep();
  const idx = flow.step + 1, n = flow.steps.length;
  const pct = (flow.step / Math.max(1, flow.steps.length - 1)) * 100;
  return `
<div class="flow-top">
  <div class="container flow-top-row">
    <span class="flow-step-name">${T('today_step_' + (step ? step.id : 'grammar'))}</span>
    <span class="flow-step-counter">${T('today_progress', idx, n)}</span>
    <button class="flow-exit" onclick="exitFlow()" aria-label="${esc(T('today_skip'))}">×</button>
  </div>
  <div class="container"><div class="flow-progress"><div class="flow-progress-fill" style="width:${pct}%"></div></div></div>
</div>`;
}

/* ---- step: grammar of the day (with an inline "break it down with AI" panel) ---- */
function renderGrammar(){
  const d = localizedToday();
  const aiBlock = grammarExplain
    ? `<div class="ai-wrap" style="margin-top:22px">${renderAiPanel('grammar')}</div>`
    : `<div class="flow-actions" style="margin-top:18px"><button class="btn" onclick="explainDay()">${T('today_grammar_explain')}</button></div>`;
  document.getElementById('app').innerHTML = flowHeader() + `
<main class="container flow-body">
  <div class="grammar-card">
    <div class="grammar-kicker">${T('today_grammar_intro')}</div>
    <div class="grammar-theme">${esc(d.weekTheme)}</div>
    <div class="grammar-focus">${esc(d.grammar)}</div>
    <div class="grammar-task"><span class="task-type">${T('type_' + d.type)}</span><br>${esc(d.text)}</div>
  </div>
  ${aiBlock}
  <div class="flow-actions">
    <button class="btn accent big" onclick="nextStep()">${T('today_next')}</button>
  </div>
</main>`;
  scrollAi();
}
/* Open the AI panel right on the grammar card and auto-ask for a point-by-point breakdown. */
function explainDay(){
  grammarExplain = true;
  render();
  if ((typeof getGeminiKey === 'function') && getGeminiKey() && ai.messages.length === 0 && !ai.loading) askTopic();
}

/* ---- AI tutor — persisted to the shared `lessons` row; pinned explanation + follow-up chat ---- */
function dayBreakdownText(){
  const d = localizedToday();
  return `${d.weekTheme}\n${d.grammar}\n\n${T('type_' + d.type)}: ${d.text}\n\n${T('today_ai_breakdown_req')}`;
}
function scrollAi(){ setTimeout(() => { const el = document.querySelector('.ai-messages'); if (el) el.scrollTop = el.scrollHeight; }, 30); }

/* The chat panel — pinned blocks (highlighted, on top) + the follow-up chat + input. Reused by the
   grammar step (context 'grammar') and the AI step (context 'ai'); renders model output via the
   shared renderMd. Pinned blocks are collapsible <details>: on the AI step the "topic breakdown" is
   collapsed by default (the day summary is what matters there); the summary stays open everywhere. */
function renderAiPanel(context){
  const hasKey = (typeof getGeminiKey === 'function') && !!getGeminiKey();
  if (!hasKey) {
    const modal = ai.keyModalOpen ? GeminiKey.renderModal({ withRemove: false, onClose: closeTodayKeyModal, onSaved: onTodayKeySaved }) : '';
    return `<div class="ai-nokey">
      <p>${T('today_ai_nokey')}</p>
      <button class="btn accent" onclick="openTodayKeyModal()">${T('today_ai_addkey')}</button>
    </div>${modal}`;
  }
  const pinned = ai.messages.filter(m => m.role === 'model' && m.pinned);
  const chat = ai.messages.filter(m => !m.seed && !(m.role === 'model' && m.pinned));
  const pinnedHtml = pinned.map(m => {
    const isSummary = m.kind === 'summary';
    const label = isSummary ? T('today_summary_label') : T('ai_pinned_label');
    const open = isSummary || context === 'grammar';   // AI step → collapse the breakdown
    return `<details class="ai-rule-wrap"${open ? ' open' : ''}><summary class="ai-rule-label">${label}</summary><div class="ai-rule">${renderMd(m.text)}</div></details>`;
  }).join('');
  const chatHtml = chat.map(m => m.role === 'model'
    ? `<div class="ai-msg model">${renderMd(m.text)}</div>`
    : `<div class="ai-msg user">${esc(m.text)}</div>`).join('');
  const thinking = ai.loading ? `<div class="ai-msg model">${esc(T('today_ai_thinking'))}</div>` : '';
  const starter = (ai.messages.length === 0 && !ai.loading)
    ? `<div class="flow-actions"><button class="btn accent" onclick="askTopic()">${T('today_ai_ask')}</button></div>` : '';
  const chatBlock = (chatHtml || thinking) ? `<div class="ai-messages">${chatHtml}${thinking}</div>` : '';
  const pinnedGroup = pinned.length ? `<div class="ai-pinned-group">${pinnedHtml}</div>` : '';
  const sep = pinned.length ? `<div class="ai-sep"><span>${T('ai_chat_sep')}</span></div>` : '';
  return `
    ${pinnedGroup}
    ${sep}
    ${starter}
    ${chatBlock}
    <div class="ai-input-row">
      <textarea class="ai-input" id="aiInput" rows="1" placeholder="${esc(T('today_ai_placeholder'))}" ${ai.loading ? 'disabled' : ''}
        oninput="aiGrowInput(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAi();}"></textarea>
      <button class="ai-send" onclick="sendAi()" ${ai.loading ? 'disabled' : ''}>${T('today_ai_send')}</button>
    </div>`;
}

/* ---- step: AI tutor (free-form follow-up) ---- */
function renderAi(){
  const hasKey = (typeof getGeminiKey === 'function') && !!getGeminiKey();
  const skip = !hasKey ? `<div class="flow-actions"><button class="btn" onclick="nextStep()">${T('today_skip')}</button></div>` : '';
  const cont = hasKey ? `<div class="flow-actions"><button class="btn" onclick="nextStep()">${T('today_next')}</button></div>` : '';
  document.getElementById('app').innerHTML = flowHeader() + `
<main class="container flow-body"><div class="ai-wrap">
  <div class="ai-head"><h2>${T('today_ai_title')}</h2><p>${T('today_ai_lead')}</p></div>
  ${renderAiPanel('ai')}
  ${skip}${cont}
</div></main>`;
  scrollAi();
}
/* Starter = the point-by-point breakdown (seed prompt is hidden); follow-ups are normal chat. */
/* Keyless AI step: open the shared connect modal in-page (no jump to /settings); on save the panel
   re-renders and the AI step unlocks. */
function openTodayKeyModal(){ ai.keyModalOpen = true; render(); }
function closeTodayKeyModal(){ ai.keyModalOpen = false; render(); }
function onTodayKeySaved(){ ai.keyModalOpen = false; render(); }

function askTopic(){ if (ai.loading) return; ai.messages.push({ role: 'user', text: dayBreakdownText(), seed: true }); runTodayTurn({ pin: 'explanation' }); }
function sendAi(){ const inp = document.getElementById('aiInput'); const t = inp ? inp.value.trim() : ''; if (!t || ai.loading) return; ai.messages.push({ role: 'user', text: t }); runTodayTurn(); }

/* On the AI step: auto-generate a once-per-day summary (grammar takeaways + word/verb results),
   pinned at the top. Skipped if one already exists (loaded from the saved lesson) or no key. */
function maybeSummarize(){
  if ((typeof getGeminiKey === 'function') && getGeminiKey() && !ai.loading && !ai.messages.some(m => m.kind === 'summary')) askSummary();
}
function daySummaryRequest(){
  const d = localizedToday();
  const fmt = (r) => (r && r.total) ? `${r.right}/${r.total}` : '—';
  return `${d.weekTheme}\n${d.grammar}\n\n${T('today_summary_data', fmt(flow.vocabResult), fmt(flow.verbResult))}\n\n${T('today_summary_req')}`;
}
function askSummary(){ if (ai.loading) return; ai.messages.push({ role: 'user', text: daySummaryRequest(), seed: true }); runTodayTurn({ pin: 'summary' }); }

async function runTodayTurn(opts){
  opts = opts || {};
  ai.loading = true; render();
  try {
    const reply = await geminiRequest(AI_MODEL_ID, getAiSystemPrompt(), ai.messages.map(m => ({ role: m.role, text: m.text })));
    const msg = { role: 'model', text: reply };
    if (opts.pin) { msg.pinned = true; msg.kind = opts.pin; }                                 // explanation or summary
    else if (!ai.messages.some(m => m.role === 'model' && m.pinned)) { msg.pinned = true; msg.kind = 'explanation'; }
    ai.messages.push(msg);
    if (typeof saveLessonToCloud === 'function') saveLessonToCloud(flow.day, ai.messages);   // shared with the planner
  } catch (e) { showToast(GeminiKey.friendlyError(e)); }
  ai.loading = false; render();
}

/* ---- step: done — close the day (only when every required block is complete) ---- */
function renderDone(){
  const day = flow.day;
  const complete = dayComplete();
  if (complete && !planner.completed[day]) {
    planner.completed[day] = true;
    if (day === planner.currentDay && planner.currentDay < TOTAL_DAYS) planner.currentDay = day + 1;
    saveToCloud();
  }
  const fmt = (r) => (r && r.total) ? `${r.right}<span class="done-stat-of">/${r.total}</span>` : '—';
  const stats = (flow.vocabResult || flow.verbResult) ? `
  <div class="done-stats">
    <div class="done-stat"><div class="done-stat-label">${T('today_done_words')}</div><div class="done-stat-val num">${fmt(flow.vocabResult)}</div></div>
    <div class="done-stat"><div class="done-stat-label">${T('today_done_verbs')}</div><div class="done-stat-val num">${fmt(flow.verbResult)}</div></div>
    <div class="done-stat-note">${T('today_done_score')}</div>
  </div>` : '';
  // Reaching the done step with a required trainer closed early → the day isn't fully finished.
  const dayLine = complete ? `<div class="done-day">${T('today_done_day', day)}</div>` : '';
  document.getElementById('app').innerHTML = flowHeader() + `
<main class="container flow-body"><div class="flow-done">
  <div class="done-mark${complete ? '' : ' partial'}">${complete ? '✓' : '↻'}</div>
  <h2>${complete ? T('today_done_title') : T('today_done_partial_title')}</h2>
  ${dayLine}
  <p>${complete ? T('today_done_msg') : T('today_done_partial_msg')}</p>
  ${stats}
  <div class="flow-actions"><a class="btn accent big" href="/planner">${T('today_done_to_planner')}</a></div>
  <button class="restart" onclick="startFlow()">↻ ${T('today_restart_day')}</button>
</div></main>`;
}

/* ==========================================================================
   INTRO / CHECKLIST
   ========================================================================== */
function renderIntro(){
  let main;
  if (dayOf() > TOTAL_DAYS) {
    main = `<main class="container flow-body"><div class="flow-done">
      <div class="done-mark">✓</div>
      <h2>${T('today_course_done_title')}</h2>
      <p>${T('today_course_done_msg')}</p>
      <div class="flow-actions"><a class="btn accent big" href="/planner">${T('today_done_to_planner')}</a></div>
    </div></main>`;
  } else {
    const d = localizedToday();
    const list = buildSteps(dayOf(), onboardingProfile()).map((step, i) => `
      <div class="step-row c${i + 1}">
        <div class="step-badge">${step.id === 'done' ? '✓' : String(i + 1).padStart(2, '0')}</div>
        <div class="step-text"><h3>${T('today_step_' + step.id)}</h3><p>${T('today_step_' + step.id + '_sub')}</p></div>
      </div>`).join('');
    const banner = planner.completed[dayOf()] ? `<div class="today-banner">${T('today_already_msg')}</div>` : '';
    main = `<main class="container">
      <section class="today-hero">
        <div class="today-daynum">
          <span class="today-daynum-big">${T('today_day_of', dayOf(), TOTAL_DAYS)}</span>
          <span class="today-daynum-sub">${T('planner_week', d.week)} · ${esc(d.weekTheme)}</span>
        </div>
        <div class="today-hero-top">
          <p class="today-lead" style="margin-top:0">${T('today_lead')}</p>
          <div class="today-badge">${T('today_minutes')}</div>
        </div>
        <div class="today-day-tag">${esc(d.grammar)}</div>
        ${banner}
        <div class="steps-label">${T('today_steps_label')}</div>
        <div class="steps-list">${list}</div>
        <div class="today-start-row"><button class="btn accent huge" onclick="startFlow()">${T('today_start')}</button></div>
      </section>
    </main>`;
  }
  document.getElementById('app').innerHTML =
    appHeader('today', { cat: 'today_title_cat', h1: T('today_steps_label'), subtitle: 'today_subtitle' })
    + main + appFooter({});
}

/* ==========================================================================
   KEYBOARD (route to whichever engine has an active session) + INIT
   ========================================================================== */
document.addEventListener('keydown', e => {
  if (VocabTrainer.state.session) { VocabTrainer.handleKeydown(e); return; }
  if (VerbsTrainer.state.session) { VerbsTrainer.handleKeydown(e); return; }
});

async function loadVocabData(){
  if (typeof currentUser === 'undefined' || !currentUser) return;
  try {
    const { data, error } = await sb.from('progress').select('vocab_data').eq('user_id', currentUser.id).single();
    if (error) throw error;
    if (data && data.vocab_data && Object.keys(data.vocab_data).length) VocabTrainer.applyData(data.vocab_data);
  } catch (e) { /* offline or no record yet — vocab starts empty */ }
}
async function afterInit(){
  wireSharedVerbStore();
  await loadVocabData();
  // Resume the same step after a page refresh (sessionStorage), if a flow was in progress for a
  // valid day. vocab/verb steps restart their session for that step (cards can't be restored).
  const saved = readFlow();
  if (saved && Number.isInteger(saved.step) && saved.step >= 0
      && Number.isInteger(saved.day) && saved.day >= 1 && saved.day <= TOTAL_DAYS
      && saved.step < buildSteps(saved.day, onboardingProfile()).length) {
    resumeFlow(saved);
  }
}
function resumeFlow(saved){
  ai = { messages: [], loading: false };
  grammarExplain = false;
  const steps = buildSteps(saved.day, onboardingProfile());
  flow = { running: true, step: Math.min(saved.step, steps.length - 1), day: saved.day, steps: steps, results: {}, vocabResult: null, verbResult: null };
  loadDayLesson(flow.day);   // its trailing render() paints the resumed step with the lesson loaded
}

// Paint the shell right away in the saved language; initApp() re-renders with cloud data.
loadLocale(getLang()).then(() => { try { render(); } catch (_) {} });
initApp().then(afterInit);
</script>
