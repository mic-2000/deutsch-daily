<script>
/* ==========================================================================
   /today — the daily-flow wizard. Walks the user through ONE study day in order,
   with no manual navigation between sections. The block set depends on the user's
   daily-minutes tariff (see buildSteps / tariff): 5-min = short grammar + one trainer
   (vocab even days / verbs odd days); 10 & 15-min = grammar + both trainers; 20+ = the
   full path with the inline AI tutor. It hosts the SHARED engines (vocab-trainer.js / verbs-trainer.js) in
   `embedded` mode (sessions only, end screen advances the flow) and reuses the
   curriculum day model (planner-data.js). "Today" = the planner's currentDay.

   Cloud columns touched, each written independently (see cloud-sync.js):
     • planner_data — read currentDay, write completion on finish (this page's CLOUD_FIELD)
     • verbs_data   — ONE shared mastery map, mutated by both engines (wireSharedVerbStore)
     • vocab_data   — driven by the vocab engine (loaded after initApp, saved via saveVocabToCloud)
   The per-day AI tutor with persisted history lives on /planner; the AI step here is a
   lightweight in-flow chat (not persisted) so it can't clobber the planner's lesson rows.
   ========================================================================== */

/* ---- planner progress (this page owns planner_data via CLOUD_FIELD) ---- */
let planner = { currentDay: 1, viewingDay: 1, completed: {} };
const CLOUD_FIELD = 'planner_data';
function getCloudPayload(){ return planner; }
function applyCloudData(d){
  if (d && typeof d === 'object') {
    planner = Object.assign({ currentDay: 1, viewingDay: 1, completed: {} }, d);
    if (!planner.completed || typeof planner.completed !== 'object') planner.completed = {};
  }
}
/* One-time reset notice for v1→v2 migrated accounts (curriculum-redesign-2026-07-v2.md §2, "Do not
   hide the reset"): cloud-sync silently rebuilt a pre-v2 planner_data into a clean v2 state, leaving
   planner.migratedFrom as the only trace. Surface a dismissible notice on the intro until the user
   acks it — the ack is a timestamp stored back inside migratedFrom, so it round-trips with the rest
   of planner_data (no new column, no localStorage; unknown-key preservation covers it end to end). */
function migrationPending(){ const m = planner.migratedFrom; return !!(m && typeof m === 'object' && !m.ackAt); }
function ackMigration(){
  const m = planner.migratedFrom;
  if (!m || typeof m !== 'object' || m.ackAt) return;
  m.ackAt = new Date().toISOString();
  saveToCloud();   // idempotent planner_data upsert — persists the ack alongside the rest of the payload
  render();
}

function dayOf(){ return planner.currentDay; }
function activeDay(){ return flow.running ? flow.day : dayOf(); }   // the day the flow is on (== currentDay normally)
function localizedToday(){ return getLocalizedDay(DAYS[Math.min(activeDay(), TOTAL_DAYS) - 1]); }
/* The day's grammar-drill slug, or null when the day has none or it doesn't resolve in GRAMMAR_DRILLS. */
function drillForDay(){ const slug = localizedToday().drill; return (slug && GrammarDrill.hasDrill(slug)) ? slug : null; }

/* ---- dialogue lookup (data/dialogues.js: DIALOGUES keyed by slug, each with a `week`) ----
   Dialogues aren't index-matched to days: each is keyed by slug and tagged with its week, and not
   every week has one. The listen block uses the CURRENT week's dialogue (re-listening across the
   week's days is fine for comprehension). */
function dialogueForWeek(week){
  if (typeof DIALOGUES === 'undefined' || !DIALOGUES) return null;
  for (const slug in DIALOGUES){
    const d = DIALOGUES[slug];
    if (d && d.week === week && Array.isArray(d.lines) && d.lines.length) return Object.assign({ slug }, d);
  }
  return null;
}
/* The week number of a study day (defaults to the flow's active day). */
function weekOfDay(day){ return getLocalizedDay(DAYS[Math.min((day != null ? day : activeDay()), TOTAL_DAYS) - 1]).week; }
/* A study day's task type (stable enum, not localized). Produce days are the productive write/speak
   tasks — they get the produce block (a short self-checked output task; Plan §3/§10). */
function dayType(day){ return DAYS[Math.min((day != null ? day : activeDay()), TOTAL_DAYS) - 1].type; }
function isProduceDay(day){ const tp = dayType(day); return tp === 'write' || tp === 'speak'; }
/* Today's listening dialogue (its week's), or null when the week has none. */
function dialogueForDay(day){ return dialogueForWeek(weekOfDay(day)); }
/* Localised { title } for a dialogue slug (active locale's dialogues block, EN fallback). Lines and
   comprehension checks stay German-only — understanding the German IS the listening task. */
function dialogueLocale(slug){
  const pick = (loc) => (loc && loc.dialogues && loc.dialogues[slug]) || null;
  return pick(window['LOCALE_' + getLang().toUpperCase()]) || pick(window.LOCALE_EN) || {};
}
/* Should the listen block run for a day? Needs TTS + a dialogue, then per-tariff (Plan §4): the light
   track (5-min) only when hardest === 'listening'; 10-min every other day (or when hardest); 15/20+
   always. Parameterised by the passed onboarding so buildSteps stays pure/testable. */
function shouldRunListening(day, onboarding){
  if (!ttsAvailable() || !dialogueForDay(day)) return false;
  const ob = onboarding || onboardingProfile();
  const hardest = ob.hardest || '';
  const t = tariff(ob);
  if (t === 5) return hardest === 'listening';
  if (t === 10) return (day % 2 === 0) || hardest === 'listening';
  return true;
}

/* Resume position across a page refresh — transient per-tab nav state (NOT progress; progress lives
   in the cloud). sessionStorage survives reload, clears on tab close — exactly "same step on refresh". */
function saveFlow(){ try { sessionStorage.setItem('today_flow', JSON.stringify({ step: flow.step, day: flow.day })); } catch (e) {} }
function clearFlow(){ try { sessionStorage.removeItem('today_flow'); } catch (e) {} }
function readFlow(){ try { return JSON.parse(sessionStorage.getItem('today_flow')); } catch (e) { return null; } }

/* ---- shared verbs_data store: both engines mutate ONE mastery map ---- */
function wireSharedVerbStore(){
  const map = (VerbsTrainer.state.mastery && typeof VerbsTrainer.state.mastery === 'object') ? VerbsTrainer.state.mastery : {};
  VerbsTrainer.setMasteryStore(map);
  VocabTrainer.setVerbStore({ mastery: map });
}
function applyVerbProgress(d){ VerbsTrainer.applyData(d && typeof d === 'object' ? d : { mastery: {} }); wireSharedVerbStore(); }

/* ---- engine persistence hooks (three independent columns) ---- */
function saveVerbsNow(){ if (typeof saveVerbsToCloud === 'function') saveVerbsToCloud(VerbsTrainer.serialize()); }
function saveVocabNow(){ if (typeof saveVocabToCloud === 'function') saveVocabToCloud(VocabTrainer.serialize()); }
/* Each engine's onSessionEnd normally files its result and advances the flow. During the optional
   weak-spots round (weak.active) the same callback instead hands the result to weakStageDone, which
   chains the family sub-sessions — so a weak sub-session never clobbers the main step's result. */
VocabTrainer.init({ embedded: true, onSessionEnd: (r) => {
  if (weak.active) { weakStageDone(r); return; }
  flow.vocabResult = r; flow.results.vocab = { completed: !!(r && r.completed) }; nextStep();
}, onSaveVocab: saveVocabNow, onSaveVerbs: saveVerbsNow });
VerbsTrainer.init({ embedded: true, onSessionEnd: (r) => {
  if (weak.active) { weakStageDone(r); return; }
  flow.verbResult = r; flow.results.verbs = { completed: !!(r && r.completed) }; nextStep();
}, onSave: saveVerbsNow });
/* GrammarDrill runs a keyed drill in the grammar step (the day's slug), the review step (due review
   topics), AND the weak-spots round (the weakest review topics). Its end advances the flow like the
   other engines; per-topic results always feed the grammar-review Leitner track (recordGrammarReview,
   so a weak-spots drill still regrades the topic). Outside the weak round the result is filed under
   whichever step is active so the done step gates on it. */
GrammarDrill.init({ embedded: true, onSessionEnd: (r) => {
  if (r && Array.isArray(r.perSlug)) recordGrammarReview(r.perSlug);
  if (weak.active) { weakStageDone(r); return; }
  const id = (currentStep() && currentStep().id) || 'grammar';
  if (id === 'grammar') flow.grammarResult = r;
  flow.results[id] = { completed: !!(r && r.completed) };
  nextStep();
} });

/* ==========================================================================
   FLOW — descriptor-driven. buildSteps() returns an ordered list of step
   descriptors for a given day; the engine walks the ENABLED ones in order and,
   at the done step, gates day-completion on the REQUIRED ones. This keeps the
   current blocks (grammar · words · verbs · AI · done) while making optional
   blocks, empty-state skips, and completion gates explicit — so later phases can
   add review/listen/produce and tariff logic by extending buildSteps() alone.
   ========================================================================== */

/* The user's onboarding profile (level / goal / minutes / hardest / language), or {} before it loads. */
function onboardingProfile(){ return (typeof userOnboarding !== 'undefined' && userOnboarding) ? userOnboarding : {}; }

/* The active daily-minutes tariff, normalized to 5 | 10 | 15 | '20+'. Onboarding stores minutes as
   the strings '5'/'10'/'15'/'20+'; this tolerates numbers too and defaults to 15 (the default path)
   when unset (e.g. grandfathered accounts with no onboarding). Drives both buildSteps() block
   selection and the per-session length cap, so the two never disagree. (Plan §4.) */
function tariff(onboarding){
  const m = (onboarding || onboardingProfile()).minutes;
  if (m === 5 || m === '5') return 5;
  if (m === 10 || m === '10') return 10;
  if (m === '20+' || m === 20 || m === '20') return '20+';
  return 15;
}

/* buildSteps(day, onboarding) → ordered step descriptors, filtered to the enabled ones. Each:
     id          — stable block id; doubles as the locale-key stem (today_step_<id> / _sub)
     required    — the day counts as done only when every enabled required block isComplete()
     enabled     — whether the block appears in the flow at all (filtered out below when false)
     run()       — paints/starts the block; advances via nextStep() (or a trainer's onSessionEnd)
     isComplete()— completion predicate, read at the done step (backed by flow.results)
   Per-tariff block selection (Plan §4):
     • 5-min (light track): short grammar + exactly ONE trainer, alternating vocab on even days /
       verbs on odd days (never both), no review, no AI step.
     • 10 / 15-min: full grammar + a due-grammar review + both trainers, no AI step (session length
       differs via sessionCap).
     • 20+ (full path): grammar + review + both trainers + the inline AI tutor step.
   The `review` block re-drills the grammar topics whose Leitner card (planner_data.grammarReview) has
   come due; it appears only when something is due (hasDueGrammarReview) and never on the light track.
   The `listen` block is a short listening-comprehension task on the week's dialogue; it appears only
   when TTS is usable AND the week has a dialogue AND shouldRunListening allows it for the tariff/day
   (light track skips listening unless hardest === 'listening'). Missing TTS/dialogue → it never
   appears (and, if it somehow did, isComplete short-circuits), so it can't deadlock the day (Gate 5).
   The `produce` block is a short productive write/speak task; it appears on produce days (write/speak
   tasks) at every tariff — micro-output on the light track, a static self-check on 10/15, and an
   optional AI-feedback turn on 20+ (Plan §4/§10). It never depends on TTS or a key (the static
   self-check always works), so it can't deadlock the day (Gate 5).
   The `weak` block is an OPTIONAL remedial round over the learner's worst cards across the four card
   families (words + plurals, verbs, grammar-review topics); it appears only on 10/15/20+ (not the
   light track) when the learner actually has weak cards (hasWeakSpots). Like AI it is never required,
   so it never blocks the day and can be bailed out of (Plan §11 Phase 6, item 14).
   Completion rules: AI + weak-spots never block the day; a trainer/review/listen block worked to the
   end (or auto-skipped on empty content) counts complete; the produce block completes on the
   learner's own self-check (never gated on writing/speech quality); closing one early leaves its
   block incomplete. */
function buildSteps(day, onboarding){
  const t = tariff(onboarding);
  const light = t === 5;
  // Light track runs one trainer per day: vocab on even days, verbs on odd days.
  const vocabEnabled = !light || day % 2 === 0;
  const verbsEnabled = !light || day % 2 === 1;
  const reviewEnabled = !light && hasDueGrammarReview();   // 10/15/20+ only, when a practised topic is due
  const listenEnabled = shouldRunListening(day, onboarding);
  const produceEnabled = isProduceDay(day);                // write/speak days, at every tariff
  const weakEnabled = !light && hasWeakSpots();            // 10/15/20+ only, when the learner has weak cards
  return [
    { id: 'grammar', required: true,           enabled: true,           run: renderGrammar,   isComplete: () => true },
    { id: 'review',  required: reviewEnabled,  enabled: reviewEnabled,  run: startReviewStep, isComplete: () => !hasDueGrammarReview() || !!(flow.results.review && flow.results.review.completed) },
    { id: 'vocab',   required: vocabEnabled,   enabled: vocabEnabled,   run: startVocabStep,  isComplete: () => !!(flow.results.vocab && flow.results.vocab.completed) },
    { id: 'verbs',   required: verbsEnabled,   enabled: verbsEnabled,   run: startVerbsStep,  isComplete: () => !!(flow.results.verbs && flow.results.verbs.completed) },
    { id: 'listen',  required: listenEnabled,  enabled: listenEnabled,  run: renderListen,    isComplete: () => !ttsAvailable() || !dialogueForDay(day) || !!(flow.results.listen && flow.results.listen.completed) },
    { id: 'produce', required: produceEnabled, enabled: produceEnabled, run: renderProduce,   isComplete: () => !isProduceDay(day) || !!(flow.results.produce && flow.results.produce.completed) },
    { id: 'ai',      required: false,          enabled: t === '20+',    run: runAiStep,       isComplete: () => true },
    { id: 'weak',    required: false,          enabled: weakEnabled,    run: startWeakStep,   isComplete: () => true },
    { id: 'done',    required: true,           enabled: true,           run: renderDone,      isComplete: () => true },
  ].filter(step => step.enabled);
}

let flow = { running: false, step: 0, day: 1, steps: [], results: {}, backlog: {} };
let ai = { messages: [], loading: false };
let grammarExplain = false;   // grammar step: AI breakdown panel expanded under the day card
let listen = { checked: false, answers: [] };   // listen step: per-question true/false picks + graded flag
let produce = { text: '', checks: {}, feedback: '', loading: false };   // produce step: draft + self-check ticks + optional AI feedback
let weak = { active: false, seq: [], stage: 0, results: {} };   // weak-spots round: cross-engine sub-session orchestration

function render(){ if (flow.running) renderStep(); else renderIntro(); }
function currentStep(){ return flow.steps[flow.step] || null; }
/* A day is finished when every enabled required descriptor reports complete (AI is not required). */
function dayComplete(){ return flow.steps.filter(s => s.required).every(s => s.isComplete()); }

function startFlow(){
  if (dayOf() > TOTAL_DAYS) return;
  const onb = onboardingProfile();
  const tariffVal = tariff(onb);
  track('today_start', { day: dayOf(), tariff: String(tariffVal) });
  ai = { messages: [], loading: false };
  grammarExplain = false;
  listen = { checked: false, answers: [] };
  produce = { text: '', checks: {}, feedback: '', loading: false };
  weak = { active: false, seq: [], stage: 0, results: {} };
  flow = { running: true, step: 0, day: dayOf(), steps: buildSteps(dayOf(), onb), results: {}, backlog: {}, vocabResult: null, verbResult: null };
  renderStep();
  loadDayLesson(flow.day);   // pull any saved explanation/chat for this day (shared with the planner)
}

/* Load this day's AI lesson (same `lessons` row the planner uses) so a saved explanation reappears. */
async function loadDayLesson(day){
  try {
    const rows = (typeof loadLessonsFromCloud === 'function') ? await loadLessonsFromCloud() : [];
    const row = Array.isArray(rows) ? rows.find(r => r.day === day) : null;
    ai.messages = (row && Array.isArray(row.messages)) ? row.messages.slice() : [];
  } catch (e) { ai.messages = []; }
  if (ai.messages.length) grammarExplain = true;   // show the saved explanation right on the grammar card
  if (flow.running) render();
}
function exitFlow(){ flow.running = false; clearFlow(); if (window.speechSynthesis) window.speechSynthesis.cancel(); render(); }
function nextStep(){ flow.step = Math.min(flow.step + 1, flow.steps.length - 1); renderStep(); }

function renderStep(){
  saveFlow();   // remember where we are, so a refresh resumes the same step
  const step = currentStep();
  if (step) step.run();
}
/* AI step run(): paint the chat, then auto-generate the once-per-day summary if a key is present. */
function runAiStep(){ renderAi(); maybeSummarize(); }
/* Cap a session to the active tariff's daily time budget (onboarding "minutes/day"). */
function sessionCap(){ return { 5: 6, 10: 12, 15: 18, '20+': 25 }[tariff()]; }
function trimSession(engine){ const s = engine.state.session; if (s && s.queue) { s.queue = s.queue.slice(0, sessionCap()); s.uniqueTotal = s.queue.length; } }
/* SRS backlog (Plan §4, curriculum-redesign-2026-07-v2.md §17 item 4): record how many DUE cards a
   trainer step couldn't fit into its capped session, so the done screen can tell the learner what
   carried over ("N cards waiting"). Measured at step start (before grading) against the tariff's
   session cap; 0 when the whole due backlog fits — the done screen only surfaces a non-zero total. */
function noteBacklog(id, due){ flow.backlog[id] = Math.max(0, (due || 0) - sessionCap()); }
function startVocabStep(){
  // Daily review: due backlog from every reached week (incl. mastered-but-due) + new words from today's week.
  // `dailyNew: true` opts into the trainer's per-day new-word budget so extra same-day sessions don't
  // keep introducing fresh words (the free-explore /vocab page omits it and stays uncapped).
  noteBacklog('vocab', VocabTrainer.dueCount(localizedToday().week));
  VocabTrainer.startSession({ type: 'daily', week: localizedToday().week, dailyNew: true });
  if (!VocabTrainer.state.session) { flow.results.vocab = { completed: true, skipped: true }; nextStep(); return; }   // empty queue (incl. daily new-word cap reached) → auto-skip, doesn't block the day
  trimSession(VocabTrainer); VocabTrainer.render();
}
function startVerbsStep(){
  noteBacklog('verbs', VerbsTrainer.dueCount());
  VerbsTrainer.startSession({ type: 'due' });                          // repetition first
  if (!VerbsTrainer.state.session) VerbsTrainer.startSession({ type: 'filter', filter: 'all', week: localizedToday().week, dailyNew: true }); // else due + some new (band-gated to today's week + capped to today's new-verb budget)
  if (!VerbsTrainer.state.session) { flow.results.verbs = { completed: true, skipped: true }; nextStep(); return; }   // nothing to train → auto-skip
  trimSession(VerbsTrainer); VerbsTrainer.render();
}

/* ---- grammar-review track (planner_data.grammarReview: { slug: Leitner card }) ----
   A grammar topic ENTERS the track the first time its drill is worked (grammar or review step): a
   soft-demotion Leitner card scheduled forward, so it comes back for review on later days. The review
   step re-drills whatever is due; each pass regrades the card topic-level (§8). */
function hasDueGrammarReview(){ return GrammarDrill.dueReviewSlugs(planner.grammarReview, Date.now()).length > 0; }
/* How many WHOLE due topics one review session re-drills — kept short (Plan §4), scaled by tariff. */
function reviewSlugCap(){ return ({ 5: 0, 10: 2, 15: 3, '20+': 5 })[tariff()] || 3; }
/* Grade a finished drill session's topics into the track. One card per FULLY worked slug (topic-level,
   not per example); soft demotion so a single slip doesn't wipe a topic. Persisted right away so
   progress survives even if the day isn't finished. */
function recordGrammarReview(perSlug){
  if (!Array.isArray(perSlug) || !perSlug.length) return;
  if (!planner.grammarReview || typeof planner.grammarReview !== 'object') planner.grammarReview = {};
  let touched = false;
  perSlug.forEach(entry => {
    if (!entry || entry.total <= 0 || entry.answered < entry.total) return;   // only fully worked topics
    const card = planner.grammarReview[entry.slug] || (planner.grammarReview[entry.slug] = leitnerBlank());
    leitnerApply(card, GrammarDrill.reviewPassed(entry), { wrongPolicy: 'soft' });
    touched = true;
  });
  if (touched) saveToCloud();   // idempotent planner_data upsert — keeps grammarReview even mid-flow
}

/* ---- step: review — re-drill the due grammar topics (most-overdue first, reviewSlugCap of them). An
   empty set auto-skips (marks review done) rather than deadlocking, mirroring the trainer empty-queue
   skips. Working the drill to its end grades the cards (via onSessionEnd → recordGrammarReview). ---- */
function startReviewStep(){
  const slugs = GrammarDrill.dueReviewSlugs(planner.grammarReview, Date.now(), reviewSlugCap());
  if (!slugs.length) { flow.results.review = { completed: true, skipped: true }; nextStep(); return; }
  GrammarDrill.startSession({ slugs, review: true });
  if (!GrammarDrill.state.session) { flow.results.review = { completed: true, skipped: true }; nextStep(); return; }
  GrammarDrill.render();
}

/* ---- step: listen — a short listening-comprehension block on the current week's dialogue. Play the
   German lines via TTS (▶ normal / 🐢 slow), optionally reveal the transcript, then judge the German
   true/false comprehension checks. No dialogue or no TTS auto-skips (completed) so the block never
   deadlocks the day (Gate 5). The block is inline (like the grammar/AI steps), not a shared engine:
   listening is a /today-only feature, so exiting mid-block = exiting the whole flow (leaves it
   incomplete), and its handlers live here as page globals for the inline onclick strings. ---- */
function renderListen(){
  const dia = dialogueForDay();
  if (!dia || !ttsAvailable()) { flow.results.listen = { completed: true, skipped: true }; nextStep(); return; }
  const qs = Array.isArray(dia.questions) ? dia.questions : [];
  if (listen.answers.length !== qs.length) listen.answers = qs.map(() => null);
  const title = dialogueLocale(dia.slug).title || dia.slug;
  const transcript = dia.lines.map(l =>
    `<div class="listen-line"><span class="listen-speaker">${esc(l.speaker || '')}</span><span>${esc(l.de)}</span></div>`).join('');
  const allAnswered = qs.length > 0 && listen.answers.every(a => a !== null);
  const tfClass = (i, q, val) => {
    let c = 'listen-tf' + (listen.answers[i] === val ? ' picked' : '');
    if (listen.checked) {
      if (val === q.answer) c += ' correct';
      else if (listen.answers[i] === val) c += ' wrong';
    }
    return c;
  };
  const questionsHtml = qs.map((q, i) => `
    <div class="listen-q${listen.checked ? (listen.answers[i] === q.answer ? ' ok' : ' bad') : ''}">
      <div class="listen-q-text">${esc(q.de)}</div>
      <div class="listen-q-btns">
        <button class="${tfClass(i, q, true)}"  ${listen.checked ? 'disabled' : ''} onclick="listenPick(${i}, true)">${T('listen_true')}</button>
        <button class="${tfClass(i, q, false)}" ${listen.checked ? 'disabled' : ''} onclick="listenPick(${i}, false)">${T('listen_false')}</button>
      </div>
    </div>`).join('');
  const right = qs.reduce((n, q, i) => n + (listen.answers[i] === q.answer ? 1 : 0), 0);
  let footer;
  if (!qs.length) footer = `<div class="flow-actions"><button class="btn accent big" onclick="finishListen()">${T('today_continue')}</button></div>`;
  else if (listen.checked) footer = `
    <div class="listen-score">${T('listen_score', right, qs.length)}</div>
    <div class="flow-actions"><button class="btn accent big" onclick="finishListen()">${T('today_continue')}</button></div>`;
  else footer = `<div class="flow-actions"><button class="btn accent big" ${allAnswered ? '' : 'disabled'} onclick="listenCheck()">${T('listen_check')}</button></div>`;
  document.getElementById('app').innerHTML = flowHeader() + `
<main class="container flow-body"><div class="listen-wrap">
  <div class="listen-head">
    <div class="listen-kicker">${T('today_step_listen')}</div>
    <h2 class="listen-title">${esc(title)}</h2>
    <p class="listen-hint">${T('listen_hint')}</p>
  </div>
  <div class="listen-controls">
    <button class="btn accent" id="listenPlay" onclick="playDialogue(false)">▶ ${T('listen_play')}</button>
    <button class="btn" onclick="playDialogue(true)">🐢 ${T('listen_play_slow')}</button>
  </div>
  <details class="listen-transcript">
    <summary>${T('listen_transcript')}</summary>
    <div class="listen-lines">${transcript}</div>
  </details>
  ${qs.length ? `<div class="listen-questions">${questionsHtml}</div>` : ''}
  ${footer}
</div></main>`;
}
/* Play the day's dialogue lines in sequence (🐢 = slower). No re-render, so the play button keeps its
   `speaking` state for the run. */
function playDialogue(slow){
  const dia = dialogueForDay(); if (!dia) return;
  speakLines(dia.lines.map(l => l.de), { btnEl: document.getElementById('listenPlay'), rate: slow ? 0.62 : 0.92 });
}
function listenPick(i, val){
  if (listen.checked || i < 0 || i >= listen.answers.length) return;
  listen.answers[i] = val;
  renderListen();
}
function listenCheck(){
  if (listen.checked || !listen.answers.length || listen.answers.some(a => a === null)) return;
  listen.checked = true;
  renderListen();
}
/* Finish the listen block: file its result (worked to the end → counts complete) and advance. The
   score is informational; completion gates the day like the other required blocks. */
function finishListen(){
  const dia = dialogueForDay();
  const qs = (dia && Array.isArray(dia.questions)) ? dia.questions : [];
  const right = qs.reduce((n, q, i) => n + (listen.answers[i] === q.answer ? 1 : 0), 0);
  flow.results.listen = { completed: true, right, total: qs.length };
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  nextStep();
}

/* ---- step: produce — a short productive task on a write/speak day. The learner produces their own
   German from the day's prompt; there is NO auto-grading (Plan §10 — never gate on writing/speech
   quality). Completion is the learner's own SELF-CHECK: a short self-assessment they tick off (the
   draft box is optional scaffolding). On the full 20+ path with a key, an optional "Get feedback"
   turn sends the draft to the AI for quick, non-blocking tips — NOT persisted (the planner owns the
   day's lesson row, so this in-flow call can't clobber it). Inline block (like listen), so its
   handlers are page globals for the onclick strings and exiting mid-block leaves it incomplete. The
   static self-check needs neither TTS nor a key, so the block can never deadlock the day (Gate 5).
   Tariff (Plan §4): light track = micro-output (1–3 sentences, single self-check); 10/15 = static
   self-check; 20+ adds the AI-feedback turn. ---- */
/* AI feedback is a 20+-only extra and needs a key (else the static self-check stands alone). */
function produceAiOn(){ return (typeof getGeminiKey === 'function') && !!getGeminiKey() && tariff() === '20+'; }
/* The self-check items for this day: first line matches the task mode (write vs speak); the light
   track keeps just that one micro-check, fuller tariffs add "used the week's language" + "proofed". */
function produceChecks(){
  const first = dayType() === 'speak' ? 'produce_check_speak' : 'produce_check_write';
  return tariff() === 5 ? [first] : [first, 'produce_check_use', 'produce_check_proof'];
}
function renderProduce(){
  const d = localizedToday();
  const light = tariff() === 5;
  const checks = produceChecks();
  const allChecked = checks.every((_, i) => !!produce.checks[i]);
  const checksHtml = checks.map((key, i) => `
    <label class="produce-check${produce.checks[i] ? ' on' : ''}">
      <input type="checkbox" ${produce.checks[i] ? 'checked' : ''} onchange="produceToggle(${i})">
      <span>${T(key)}</span>
    </label>`).join('');
  let aiOut = '';
  if (produce.loading) aiOut = `<div class="produce-ai-out">${esc(T('produce_ai_thinking'))}</div>`;
  else if (produce.feedback) aiOut = `<div class="produce-ai-out"><div class="produce-ai-label">${T('produce_ai_label')}</div>${renderMd(produce.feedback)}</div>`;
  const aiBlock = produceAiOn() ? `
  <div class="produce-ai">
    <div class="produce-ai-hint">${T('produce_ai_hint')}</div>
    <button class="btn" ${produce.loading ? 'disabled' : ''} onclick="produceFeedback()">${produce.feedback ? T('produce_ai_again') : T('produce_ai_get')}</button>
    ${aiOut}
  </div>` : '';
  document.getElementById('app').innerHTML = flowHeader() + `
<main class="container flow-body"><div class="produce-wrap">
  <div class="produce-head">
    <div class="produce-kicker">${T('today_step_produce')}</div>
    <h2 class="produce-title">${esc(d.weekTheme)}</h2>
    <div class="produce-prompt"><span class="task-type">${T('type_' + d.type)}</span><br>${esc(d.text)}</div>
  </div>
  <p class="produce-hint">${light ? T('produce_hint_light') : T('produce_hint')}</p>
  <textarea class="produce-input" id="produceInput" rows="${light ? 3 : 6}" placeholder="${esc(T('produce_placeholder'))}" oninput="produceType(this.value)">${esc(produce.text)}</textarea>
  ${aiBlock}
  <div class="produce-selfcheck">
    <div class="produce-selfcheck-title">${T('produce_selfcheck_title')}</div>
    ${checksHtml}
  </div>
  <div class="flow-actions"><button class="btn accent big" ${allChecked ? '' : 'disabled'} onclick="finishProduce()">${T('today_continue')}</button></div>
</div></main>`;
}
/* Keep the draft in state on every keystroke, so a re-render (self-check tick / feedback) preserves it. */
function produceType(v){ produce.text = v; }
function produceToggle(i){ produce.checks[i] = !produce.checks[i]; renderProduce(); }
/* Optional AI feedback (20+ with a key). One-shot request off the current draft; the reply is shown
   inline and NOT saved to the lessons row. Never blocks — a failure just toasts. */
async function produceFeedback(){
  const text = (produce.text || '').trim();
  if (!text) { showToast(T('produce_ai_empty')); return; }
  if (produce.loading) return;
  produce.loading = true; renderProduce();
  try {
    const reply = await geminiRequest(AI_MODEL_ID, getAiSystemPrompt(), [{ role: 'user', text: T('produce_ai_req', localizedToday().text, text) }]);
    produce.feedback = reply;
  } catch (e) { showToast(GeminiKey.friendlyError(e)); }
  produce.loading = false; renderProduce();
}
/* Finish the produce block on the learner's self-check (quality is never graded); advance the flow. */
function finishProduce(){ flow.results.produce = { completed: true }; nextStep(); }

/* ---- step: weak-spots (Plan §11 Phase 6, item 14) — an OPTIONAL remedial round over the learner's
   worst cards across the four families: non-verb words + plurals (the vocab engine), verbs, and
   grammar-review topics (whose weakest cards live in planner_data.grammarReview). It runs each family
   that HAS weak cards as its own sub-session in turn (vocab → verbs → grammar), reusing the very same
   engines the main steps use; the engines' onSessionEnd routes to weakStageDone while weak.active is
   set. Never required (like the AI step): no weak cards → the step auto-skips; a completed sub-session
   chains to the next family; bailing (× on a sub-session) ends the round early. Selection is re-scanned
   at run time, so a family the learner shored up earlier today simply drops out. ---- */
function weakCap(){ return ({ 10: 8, 15: 12, '20+': 16 })[tariff()] || 12; }          // card cap per trainer family
function weakGrammarCap(){ return ({ 10: 1, 15: 2, '20+': 3 })[tariff()] || 2; }      // whole grammar topics
/* The families that currently have weak cards, in run order. Cheap (pure reads), so buildSteps and
   the step itself can both call it. */
function weakSeq(){
  const seq = [];
  if (VocabTrainer.weakCount() > 0) seq.push('vocab');
  if (VerbsTrainer.weakCount() > 0) seq.push('verbs');
  if (GrammarDrill.weakReviewSlugs(planner.grammarReview).length > 0) seq.push('grammar');
  return seq;
}
function hasWeakSpots(){ return weakSeq().length > 0; }
/* Enter the weak-spots round: build the family sequence, then start the first sub-session. An empty
   sequence auto-skips (marks the block done) rather than deadlocking, mirroring the trainer skips. */
function startWeakStep(){
  const seq = weakSeq();
  if (!seq.length) { flow.results.weak = { completed: true, skipped: true }; nextStep(); return; }
  weak = { active: true, seq, stage: 0, results: {} };
  startWeakStage();
}
/* Start the current family's weak sub-session. An empty queue (nothing survived the re-scan) skips
   straight to the next family via weakStageDone(null). */
function startWeakStage(){
  const id = weak.seq[weak.stage];
  if (id === 'vocab'){
    VocabTrainer.startSession({ type: 'weak', cap: weakCap() });
    if (!VocabTrainer.state.session) { weakStageDone(null); return; }
    trimSession(VocabTrainer); VocabTrainer.render();
  } else if (id === 'verbs'){
    VerbsTrainer.startSession({ type: 'weak', cap: weakCap() });
    if (!VerbsTrainer.state.session) { weakStageDone(null); return; }
    trimSession(VerbsTrainer); VerbsTrainer.render();
  } else {
    const slugs = GrammarDrill.weakReviewSlugs(planner.grammarReview, weakGrammarCap());
    GrammarDrill.startSession({ slugs, review: true });
    if (!GrammarDrill.state.session) { weakStageDone(null); return; }
    GrammarDrill.render();
  }
}
/* A weak sub-session ended (r === null when the family auto-skipped on an empty queue). A completed
   sub-session advances to the next family; bailing out (× → completed:false) ends the whole optional
   round. When every family is done, advance the flow to the done step. */
function weakStageDone(r){
  const id = weak.seq[weak.stage];
  if (r) weak.results[id] = { right: r.right || 0, total: r.total || 0, completed: !!r.completed };
  if (r && r.completed === false) { finishWeak(); return; }   // bailed → stop the round
  weak.stage++;
  if (weak.stage < weak.seq.length) { startWeakStage(); return; }
  finishWeak();
}
function finishWeak(){ weak.active = false; flow.results.weak = { completed: true }; nextStep(); }

/* ---- shared in-flow header (progress) ---- */
function flowHeader(){
  const step = currentStep();
  const idx = flow.step + 1, n = flow.steps.length;
  const pct = (flow.step / Math.max(1, flow.steps.length - 1)) * 100;
  return `
<div class="flow-top">
  <div class="container flow-top-row">
    <span class="flow-step-name">${T('today_step_' + (step ? step.id : 'grammar'))}</span>
    <span class="flow-step-counter">${T('today_progress', idx, n)}</span>
    <button class="flow-exit" onclick="exitFlow()" aria-label="${esc(T('today_skip'))}">×</button>
  </div>
  <div class="container"><div class="flow-progress"><div class="flow-progress-fill" style="width:${pct}%"></div></div></div>
</div>`;
}

/* ---- step: grammar of the day — concept card + an inline "break it down with AI" panel, and (when
   the day has a keyed drill) an interactive drill via the GrammarDrill engine. The drill is optional
   practice: grammar's isComplete() stays true so a drill-less day — or a skipped drill — never
   deadlocks the flow. Working the drill to its end advances the flow (onSessionEnd → nextStep). ---- */
function renderGrammar(){
  const d = localizedToday();
  const slug = drillForDay();
  const aiBlock = grammarExplain
    ? `<div class="ai-wrap" style="margin-top:22px">${renderAiPanel('grammar')}</div>`
    : `<div class="flow-actions" style="margin-top:18px"><button class="btn" onclick="explainDay()">${T('today_grammar_explain')}</button></div>`;
  const actions = slug
    ? `<div class="flow-actions">
         <button class="btn accent big" onclick="startGrammarDrill()">${T('today_grammar_practice')}</button>

       </div>`
    : `<div class="flow-actions">
         <button class="btn accent big" onclick="nextStep()">${T('today_next')}</button>
       </div>`;
  document.getElementById('app').innerHTML = flowHeader() + `
<main class="container flow-body">
  <div class="grammar-card">

    <div class="grammar-theme">${esc(d.weekTheme)}</div>
    <div class="grammar-focus">${esc(d.grammar)}</div>
    <div class="grammar-task"><span class="task-type">${T('type_' + d.type)}</span><br>${esc(d.text)}</div>
  </div>

/* Launch the day's interactive grammar drill. An empty/unknown drill auto-skips (marks grammar done)
   rather than leaving a blank step, mirroring the vocab/verb empty-queue skips. */
function startGrammarDrill(){
  const slug = drillForDay();
  if (!slug) { nextStep(); return; }
  GrammarDrill.startSession({ slug });
  if (!GrammarDrill.state.session) { flow.results.grammar = { completed: true, skipped: true }; nextStep(); return; }
  GrammarDrill.render();
}
/* Open the AI panel right on the grammar card and auto-ask for a point-by-point breakdown. */
function explainDay(){
  grammarExplain = true;
  render();
  if ((typeof getGeminiKey === 'function') && getGeminiKey() && ai.messages.length === 0 && !ai.loading) askTopic();
}

/* ---- AI tutor — persisted to the shared `lessons` row; pinned explanation + follow-up chat ---- */
function dayBreakdownText(){
  const d = localizedToday();
  return `${d.weekTheme}\n${d.grammar}\n\n${T('type_' + d.type)}: ${d.text}\n\n${T('today_ai_breakdown_req')}`;
}
function scrollAi(){ setTimeout(() => { const el = document.querySelector('.ai-messages'); if (el) el.scrollTop = el.scrollHeight; }, 30); }

/* The chat panel — pinned blocks (highlighted, on top) + the follow-up chat + input. Reused by the
   grammar step (context 'grammar') and the AI step (context 'ai'); renders model output via the
   shared renderMd. Pinned blocks are collapsible <details>: on the AI step the "topic breakdown" is
   collapsed by default (the day summary is what matters there); the summary stays open everywhere. */
function renderAiPanel(context){
  const hasKey = (typeof getGeminiKey === 'function') && !!getGeminiKey();
  if (!hasKey) {
    const modal = ai.keyModalOpen ? GeminiKey.renderModal({ withRemove: false, onClose: closeTodayKeyModal, onSaved: onTodayKeySaved }) : '';
    return `<div class="ai-nokey">
      <p>${T('today_ai_nokey')}</p>
      <button class="btn accent" onclick="openTodayKeyModal()">${T('today_ai_addkey')}</button>
    </div>${modal}`;
  }
  const pinned = ai.messages.filter(m => m.role === 'model' && m.pinned);
  const chat = ai.messages.filter(m => !m.seed && !(m.role === 'model' && m.pinned));
  const pinnedHtml = pinned.map(m => {
    const isSummary = m.kind === 'summary';
    const label = isSummary ? T('today_summary_label') : T('ai_pinned_label');
    const open = isSummary || context === 'grammar';   // AI step → collapse the breakdown
    return `<details class="ai-rule-wrap"${open ? ' open' : ''}><summary class="ai-rule-label">${label}</summary><div class="ai-rule">${renderMd(m.text)}</div></details>`;
  }).join('');
  const chatHtml = chat.map(m => m.role === 'model'
    ? `<div class="ai-msg model">${renderMd(m.text)}</div>`
    : `<div class="ai-msg user">${esc(m.text)}</div>`).join('');
  const thinking = ai.loading ? `<div class="ai-msg model">${esc(T('today_ai_thinking'))}</div>` : '';
  const starter = (ai.messages.length === 0 && !ai.loading)
    ? `<div class="flow-actions"><button class="btn accent" onclick="askTopic()">${T('today_ai_ask')}</button></div>` : '';
  const chatBlock = (chatHtml || thinking) ? `<div class="ai-messages">${chatHtml}${thinking}</div>` : '';
  const pinnedGroup = pinned.length ? `<div class="ai-pinned-group">${pinnedHtml}</div>` : '';
  const sep = pinned.length ? `<div class="ai-sep"><span>${T('ai_chat_sep')}</span></div>` : '';
  return `
    ${pinnedGroup}
    ${sep}
    ${starter}
    ${chatBlock}
    <div class="ai-input-row">
      <textarea class="ai-input" id="aiInput" rows="1" placeholder="${esc(T('today_ai_placeholder'))}" ${ai.loading ? 'disabled' : ''}
        oninput="aiGrowInput(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAi();}"></textarea>
      <button class="ai-send" onclick="sendAi()" ${ai.loading ? 'disabled' : ''}>${T('today_ai_send')}</button>
    </div>`;
}

/* ---- step: AI tutor (free-form follow-up) ---- */
function renderAi(){
  const hasKey = (typeof getGeminiKey === 'function') && !!getGeminiKey();
  const skip = !hasKey ? `<div class="flow-actions"><button class="btn" onclick="nextStep()">${T('today_skip')}</button></div>` : '';
  const cont = hasKey ? `<div class="flow-actions"><button class="btn" onclick="nextStep()">${T('today_next')}</button></div>` : '';
  document.getElementById('app').innerHTML = flowHeader() + `
<main class="container flow-body"><div class="ai-wrap">

  ${renderAiPanel('ai')}

</div></main>`;

}
/* Starter = the point-by-point breakdown (seed prompt is hidden); follow-ups are normal chat. */
/* Keyless AI step: open the shared connect modal in-page (no jump to /settings); on save the panel
   re-renders and the AI step unlocks. */
function openTodayKeyModal(){ ai.keyModalOpen = true; render(); }
function closeTodayKeyModal(){ ai.keyModalOpen = false; render(); }
function onTodayKeySaved(){ ai.keyModalOpen = false; render(); }

function askTopic(){ if (ai.loading) return; ai.messages.push({ role: 'user', text: dayBreakdownText(), seed: true }); runTodayTurn({ pin: 'explanation' }); }
function sendAi(){ const inp = document.getElementById('aiInput'); const t = inp ? inp.value.trim() : ''; if (!t || ai.loading) return; ai.messages.push({ role: 'user', text: t }); runTodayTurn(); }

/* On the AI step: auto-generate a once-per-day summary (grammar takeaways + word/verb results),
   pinned at the top. Skipped if one already exists (loaded from the saved lesson) or no key. */
function maybeSummarize(){
  if ((typeof getGeminiKey === 'function') && getGeminiKey() && !ai.loading && !ai.messages.some(m => m.kind === 'summary')) askSummary();
}
function daySummaryRequest(){
  const d = localizedToday();
  const fmt = (r) => (r && r.total) ? `${r.right}/${r.total}` : '—';
  return `${d.weekTheme}\n${d.grammar}\n\n${T('today_summary_data', fmt(flow.vocabResult), fmt(flow.verbResult))}\n\n${T('today_summary_req')}`;
}
function askSummary(){ if (ai.loading) return; ai.messages.push({ role: 'user', text: daySummaryRequest(), seed: true }); runTodayTurn({ pin: 'summary' }); }

async function runTodayTurn(opts){
  opts = opts || {};
  ai.loading = true; render();
  try {
    const reply = await geminiRequest(AI_MODEL_ID, getAiSystemPrompt(), ai.messages.map(m => ({ role: m.role, text: m.text })));
    const msg = { role: 'model', text: reply };
    if (opts.pin) { msg.pinned = true; msg.kind = opts.pin; }                                 // explanation or summary
    else if (!ai.messages.some(m => m.role === 'model' && m.pinned)) { msg.pinned = true; msg.kind = 'explanation'; }
    ai.messages.push(msg);
    if (typeof saveLessonToCloud === 'function') saveLessonToCloud(flow.day, ai.messages);   // shared with the planner
  } catch (e) { showToast(GeminiKey.friendlyError(e)); }
  ai.loading = false; render();
}

/* Record a per-day completion summary into planner_data.dayStats (seeded {} by the v2 migration but
   never written until now). Keyed by day number; carried through save/load with the rest of the
   planner payload (getCloudPayload returns `planner` whole; applyCloudData preserves foreign keys).
   `blocks` = the enabled non-done steps and whether each was completed; `counts` = trainer scores. */
function recordDayStats(day){
  if (!planner.dayStats || typeof planner.dayStats !== 'object') planner.dayStats = {};
  const score = (r) => (r && typeof r === 'object') ? { right: r.right || 0, total: r.total || 0 } : null;
  planner.dayStats[day] = {
    completedAt: new Date().toISOString(),
    blocks: flow.steps.filter(s => s.id !== 'done').map(s => ({ id: s.id, required: !!s.required, completed: !!s.isComplete() })),
    counts: { vocab: score(flow.vocabResult), verbs: score(flow.verbResult), listen: score(flow.results.listen) },
  };
  const week = Math.ceil(day / 5);
  const tariffVal = tariff();
  track('day_complete', { day: day, week: week, tariff: String(tariffVal) });
}

/* Course-readiness for the flow's current day, measured from the LIVE steps (same block shape
   recordDayStats persists), so it works on both the complete and the partial done screen regardless of
   whether dayStats has been written yet. Delegates the actual measure to the shared dayReadiness
   (planner-data.js) so /today and /planner agree. (Plan §4, §17 item 5.) */
function currentReadiness(){
  const blocks = flow.steps.filter(s => s.id !== 'done').map(s => ({ id: s.id, completed: !!s.isComplete() }));
  return dayReadiness(blocks);
}

/* The current week's "I can…" statements from the active locale (weeks block), EN fallback. Read-only;
   surfaced on the done screen so the learner sees the week's concrete goals. */
function weekCanDo(){
  const wk = localizedToday().week;
  const pick = (loc) => { const w = loc && loc.weeks && loc.weeks[wk]; return (w && Array.isArray(w.canDo)) ? w.canDo : null; };
  return pick(window['LOCALE_' + getLang().toUpperCase()]) || pick(window.LOCALE_EN) || [];
}

/* ---- step: done — close the day (only when every required block is complete) ---- */
function renderDone(){
  const day = flow.day;
  const complete = dayComplete();
  if (complete && !planner.completed[day]) {
    planner.completed[day] = true;
    recordDayStats(day);
    if (day === planner.currentDay && planner.currentDay < TOTAL_DAYS) planner.currentDay = day + 1;
    saveToCloud();
  }
  const fmt = (r) => (r && r.total) ? `${r.right}<span class="done-stat-of">/${r.total}</span>` : '—';
  const stats = (flow.vocabResult || flow.verbResult) ? `
  <div class="done-stats">
    <div class="done-stat"><div class="done-stat-label">${T('today_done_words')}</div><div class="done-stat-val num">${fmt(flow.vocabResult)}</div></div>
    <div class="done-stat"><div class="done-stat-label">${T('today_done_verbs')}</div><div class="done-stat-val num">${fmt(flow.verbResult)}</div></div>
    <div class="done-stat-note">${T('today_done_score')}</div>
  </div>` : '';
  // SRS backlog: due cards that didn't fit today's capped session carry over. Surfaced only when a
  // trainer's due backlog actually overflowed the budget (typically the shorter tariffs). (Plan §4.)
  const waiting = Object.keys(flow.backlog).reduce((n, id) => n + (flow.backlog[id] || 0), 0);
  const backlogBlock = waiting > 0 ? `<div class="done-backlog">${T('today_backlog', waiting)}</div>` : '';
  // 5-min light track: remind the learner this is a maintenance pace, not the full B1 path. (Plan §4.)
  const lightNote = tariff() === 5 ? `<div class="done-light">${T('today_light_pace')}</div>` : '';
  // Course readiness — the share of today's core SRS families (grammar · vocab · verbs) actually worked,
  // shown DISTINCT from the streak/day-completion mark. Only surfaced on partial coverage (the light
  // track runs one of two trainers → 2/3), so a full day (100%) stays uncluttered. (Plan §4, §17 item 5.)
  const rd = currentReadiness();
  const readinessBlock = (rd && !rd.full) ? `
  <div class="done-readiness">
    <div class="done-readiness-head">
      <span class="done-readiness-label">${T('today_readiness_title')}</span>
      <span class="done-readiness-frac num">${rd.worked}<span class="done-readiness-of">/${rd.total}</span></span>
    </div>
    <div class="done-readiness-bar"><div class="done-readiness-fill" style="width:${Math.round(rd.worked / rd.total * 100)}%"></div></div>
    <p class="done-readiness-note">${T('today_readiness_note', rd.worked, rd.total)}</p>
  </div>` : '';
  const canDo = weekCanDo();
  const canDoBlock = canDo.length ? `
  <div class="done-cando">
    <div class="done-cando-title">${T('today_cando_title')}</div>
    <ul class="done-cando-list">${canDo.map(s => `<li>${esc(s)}</li>`).join('')}</ul>
  </div>` : '';
  // Reaching the done step with a required trainer closed early → the day isn't fully finished.
  const dayLine = complete ? `<div class="done-day">${T('today_done_day', day)}</div>` : '';
  document.getElementById('app').innerHTML = flowHeader() + `
<main class="container flow-body"><div class="flow-done">
  <div class="done-mark${complete ? '' : ' partial'}">${complete ? '✓' : '↻'}</div>
  <h2>${complete ? T('today_done_title') : T('today_done_partial_title')}</h2>
  ${dayLine}
  <p>${complete ? T('today_done_msg') : T('today_done_partial_msg')}</p>
  ${stats}
  ${backlogBlock}
  ${lightNote}
  ${readinessBlock}
  ${canDoBlock}
  <div class="flow-actions"><a class="btn accent big" href="/planner">${T('today_done_to_planner')}</a></div>
  <button class="restart" onclick="startFlow()">↻ ${T('today_restart_day')}</button>
</div></main>`;
}

/* ==========================================================================
   INTRO / CHECKLIST
   ========================================================================== */
function renderIntro(){
  const notice = migrationPending() ? `<div class="today-migrated" role="status">
        <div class="today-migrated-body">
          <strong>${T('today_migrated_title')}</strong>
          <p>${T('today_migrated_msg')}</p>
        </div>
        <button class="today-migrated-ack" onclick="ackMigration()">${T('today_migrated_dismiss')}</button>
      </div>` : '';
  let main;
  if (dayOf() > TOTAL_DAYS) {
    main = `<main class="container flow-body">${notice}<div class="flow-done">
      <div class="done-mark">✓</div>
      <h2>${T('today_course_done_title')}</h2>
      <p>${T('today_course_done_msg')}</p>
      <div class="flow-actions"><a class="btn accent big" href="/planner">${T('today_done_to_planner')}</a></div>
    </div></main>`;
  } else {
    const d = localizedToday();
    const list = buildSteps(dayOf(), onboardingProfile()).map((step, i) => `
      <div class="step-row c${i + 1}">
        <div class="step-badge">${step.id === 'done' ? '✓' : String(i + 1).padStart(2, '0')}</div>
        <div class="step-text"><h3>${T('today_step_' + step.id)}</h3><p>${T('today_step_' + step.id + '_sub')}</p></div>
      </div>`).join('');
    const banner = planner.completed[dayOf()] ? `<div class="today-banner">${T('today_already_msg')}</div>` : '';
    main = `<main class="container">
      <section class="today-hero">
        <div class="today-daynum">
          <span class="today-daynum-big">${T('today_day_of', dayOf(), TOTAL_DAYS)}</span>
          <span class="today-daynum-sub">${T('planner_week', d.week)} · ${esc(d.weekTheme)}</span>
        </div>
        <div class="today-hero-top">
          <p class="today-lead" style="margin-top:0">${T('today_lead')}</p>
          <div class="today-badge">${T('today_minutes')}</div>
        </div>
        <div class="today-day-tag">${esc(d.grammar)}</div>
        ${notice}
        ${banner}
        <div class="steps-label">${T('today_steps_label')}</div>
        <div class="steps-list">${list}</div>
        <div class="today-start-row"><button class="btn accent huge" onclick="startFlow()">${T('today_start')}</button></div>
      </section>
    </main>`;
  }
  document.getElementById('app').innerHTML =
    appHeader('today', { cat: 'today_title_cat', h1: T('today_steps_label'), subtitle: 'today_subtitle' })
    + main + appFooter({});
}

/* ==========================================================================
   KEYBOARD (route to whichever engine has an active session) + INIT
   ========================================================================== */
document.addEventListener('keydown', e => {
  if (GrammarDrill.state.session) { GrammarDrill.handleKeydown(e); return; }
  if (VocabTrainer.state.session) { VocabTrainer.handleKeydown(e); return; }
  if (VerbsTrainer.state.session) { VerbsTrainer.handleKeydown(e); return; }
});

async function loadVocabData(){
  if (typeof currentUser === 'undefined' || !currentUser) return;
  try {
    const { data, error } = await sb.from('progress').select('vocab_data').eq('user_id', currentUser.id).single();
    if (error) throw error;
    if (data && data.vocab_data && Object.keys(data.vocab_data).length) VocabTrainer.applyData(data.vocab_data);
  } catch (e) { /* offline or no record yet — vocab starts empty */ }
}
async function afterInit(){
  wireSharedVerbStore();
  await loadVocabData();
  // Resume the same step after a page refresh (sessionStorage), if a flow was in progress for a
  // valid day. vocab/verb steps restart their session for that step (cards can't be restored).
  const saved = readFlow();
  if (saved && Number.isInteger(saved.step) && saved.step >= 0
      && Number.isInteger(saved.day) && saved.day >= 1 && saved.day <= TOTAL_DAYS
      && saved.step < buildSteps(saved.day, onboardingProfile()).length) {
    resumeFlow(saved);
  }
}
function resumeFlow(saved){
  ai = { messages: [], loading: false };
  grammarExplain = false;
  listen = { checked: false, answers: [] };
  produce = { text: '', checks: {}, feedback: '', loading: false };
  weak = { active: false, seq: [], stage: 0, results: {} };
  const steps = buildSteps(saved.day, onboardingProfile());
  flow = { running: true, step: Math.min(saved.step, steps.length - 1), day: saved.day, steps: steps, results: {}, backlog: {}, vocabResult: null, verbResult: null };
  loadDayLesson(flow.day);   // its trailing render() paints the resumed step with the lesson loaded
}

// Paint the shell right away in the saved language; initApp() re-renders with cloud data.
// Gate 3: if the PWA cache is serving mixed course versions, prompt a reload instead of rendering.
loadLocale(getLang()).then(() => { try { if (courseVersionBlocked()) return; render(); } catch (_) {} });
if (courseVersionConsistent()) initApp().then(afterInit);
</script>
