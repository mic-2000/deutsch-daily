<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch · Vokabeltrainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root {
  --paper: #F2EDE3; --paper-2: #E8E0D0; --paper-3: #FAF6EC;
  --ink: #1C1A17; --ink-soft: #4A453D; --line: #BFB5A0;
  --accent: #B5512A; --accent-2: #8C3F1F; --green: #4A7C3A; --gold: #C5963B;
  --der: #2F5C8F; --die: #A23B2D; --das: #3F7A3A;
  --serif: 'Fraunces', Georgia, serif; --sans: 'Manrope', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; line-height: 1.5; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; }
.serif { font-family: var(--serif); }
.container { max-width: 920px; margin: 0 auto; padding: 0 24px; }
.uppercase-mini { font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em; color: var(--ink-soft); }
.num { font-variant-numeric: tabular-nums; }

header { border-bottom: 1px solid var(--line); padding: 26px 0 22px; }
.title-cat { color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 0.3em; }
h1 { font-family: var(--serif); font-size: 44px; font-weight: 300; margin-top: 4px; letter-spacing: -0.02em; line-height: 1; }
h1 em { color: var(--accent); font-style: italic; }
.subtitle { font-family: var(--serif); font-style: italic; font-size: 16px; color: var(--ink-soft); margin-top: 6px; }

.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; padding: 18px 0; border-bottom: 1px solid var(--line); }
.stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.25em; color: var(--ink-soft); }
.stat-big { font-family: var(--serif); font-size: 32px; font-weight: 300; margin-top: 2px; }
.stat-big.accent { color: var(--accent); }
.stat-big.green { color: var(--green); }
.stat-sub { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }

main { padding: 24px 0 60px; }

/* due banner */
.due-banner { background: var(--ink); color: var(--paper); padding: 18px 22px; display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 22px; }
.due-banner-text { font-family: var(--serif); font-size: 19px; }
.due-banner-text small { display: block; font-family: var(--sans); font-size: 12px; opacity: 0.7; margin-top: 2px; }
.btn { padding: 11px 18px; border: 1px solid var(--ink); font-size: 14px; transition: all 0.15s; display: inline-flex; gap: 8px; align-items: center; justify-content: center; white-space: nowrap; }
.btn:hover { background: var(--ink); color: var(--paper); }
.btn.primary { background: var(--ink); color: var(--paper); }
.btn.accent { background: var(--accent); color: var(--paper); border-color: var(--accent); }
.btn.accent:hover { background: var(--accent-2); border-color: var(--accent-2); }
.btn.on-dark { background: var(--paper); color: var(--ink); border-color: var(--paper); }
.btn.on-dark:hover { background: var(--gold); border-color: var(--gold); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn.big { padding: 14px 24px; font-size: 15px; font-weight: 600; }

/* modes toggle */
.settings-bar { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; padding: 14px 18px; background: var(--paper-3); border: 1px solid var(--line); }
.settings-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--ink-soft); }
.chip { padding: 7px 14px; border: 1px solid var(--line); font-size: 13px; display: inline-flex; gap: 7px; align-items: center; transition: all 0.12s; }
.chip.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.chip-check { width: 14px; height: 14px; border: 1.5px solid currentColor; border-radius: 3px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; }
.sync-hint { font-size: 12px; color: var(--ink-soft); font-style: italic; max-width: 520px; line-height: 1.4; }

/* week tabs */
.week-tabs { margin-bottom: 22px; }
.tabs-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.tabs-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.wt { width: 42px; height: 42px; border: 1px solid var(--line); font-size: 13px; transition: all 0.12s; display: flex; align-items: center; justify-content: center; position: relative; }
.wt:hover { border-color: var(--ink); }
.wt.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.wt-dot { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; border-radius: 50%; }

/* week header */
.wk-header { background: var(--paper-3); border: 1px solid var(--ink); padding: 20px 24px; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
.wk-num { font-family: var(--serif); font-size: 44px; font-weight: 300; color: var(--accent); line-height: 1; }
.wk-meta { flex: 1; min-width: 200px; padding-left: 14px; }
.wk-theme { font-family: var(--serif); font-size: 21px; }
.wk-count { font-size: 12px; color: var(--ink-soft); margin-top: 4px; }

/* vocab list */
.vocab-list { border: 1px solid var(--line); }
.vocab-row { display: grid; grid-template-columns: 1fr 1fr 90px 36px; gap: 14px; align-items: center; padding: 9px 18px; border-bottom: 1px solid var(--line); }
.vocab-row:last-child { border-bottom: none; }
.vocab-row.mastered { background: #EDE5D2; }
.vocab-de { font-family: var(--serif); font-size: 17px; }
.vocab-de .art { font-weight: 600; }
.vocab-de .art.der { color: var(--der); } .vocab-de .art.die { color: var(--die); } .vocab-de .art.das { color: var(--das); }
.vocab-ru { font-size: 14px; color: var(--ink-soft); }
.box-bar { display: flex; gap: 2px; cursor: pointer; background: none; border: none; padding: 4px 0; }
.box-seg { width: 9px; height: 9px; border: 1px solid var(--line); }
.box-seg.fill { background: var(--gold); border-color: var(--gold); }
.box-seg.fill.full { background: var(--green); border-color: var(--green); }
.mini-audio { color: var(--ink-soft); opacity: 0.6; font-size: 15px; }
.mini-audio:hover { opacity: 1; color: var(--accent); }

.info-box { background: var(--paper-3); border-left: 3px solid var(--accent); padding: 14px 18px; margin-top: 22px; font-size: 14px; color: var(--ink-soft); line-height: 1.6; }
.info-box b { color: var(--ink); }

footer { border-top: 1px solid var(--line); padding: 18px 0; margin-top: 36px; }
.f-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; font-size: 12px; color: var(--ink-soft); }

/* user bar */
.user-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
.user-email { font-size: 12px; color: var(--ink-soft); }
.btn-logout { font-size: 12px; color: var(--accent); text-decoration: underline; text-underline-offset: 3px; cursor: pointer; background: none; border: none; font-family: inherit; }
.btn-logout:hover { color: var(--accent-2); }
.nav-tabs { display: flex; gap: 8px; }
.nav-tab { font-size: 12px; padding: 5px 14px; border: 1px solid var(--line); color: var(--ink-soft); text-decoration: none; transition: all 0.15s; }
.nav-tab:hover { border-color: var(--ink); color: var(--ink); }
.nav-tab.active { border-color: var(--ink); background: var(--ink); color: var(--paper); }

/* ===== SESSION ===== */
.session-bg { position: fixed; inset: 0; background: var(--paper); z-index: 50; display: flex; flex-direction: column; }
.session-top { border-bottom: 1px solid var(--line); padding: 16px 0; }
.session-top-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.session-mode-badge { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; padding: 5px 12px; border-radius: 2px; color: var(--paper); }
.session-mode-badge.flashcard { background: var(--ink); }
.session-mode-badge.article { background: var(--der); }
.session-mode-badge.spelling { background: var(--accent); }
.session-counter { font-size: 12px; color: var(--ink-soft); }
.session-close { font-size: 24px; padding: 2px 10px; color: var(--ink-soft); }
.session-close:hover { color: var(--accent); }
.session-progress { height: 4px; background: var(--paper-2); margin-top: 14px; }
.session-progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }

.session-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
.card { width: 100%; max-width: 560px; text-align: center; }
.card-prompt-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.25em; color: var(--ink-soft); margin-bottom: 16px; }
.card-word { font-family: var(--serif); font-size: 52px; font-weight: 300; line-height: 1.1; margin: 8px 0; }
.card-word .art.der { color: var(--der); } .card-word .art.die { color: var(--die); } .card-word .art.das { color: var(--das); }
.card-sub { font-family: var(--serif); font-style: italic; font-size: 24px; color: var(--accent); margin: 14px 0; min-height: 30px; }
.audio-btn { width: 52px; height: 52px; border: 2px solid var(--ink); border-radius: 50%; font-size: 22px; display: inline-flex; align-items: center; justify-content: center; margin: 10px 0; transition: all 0.15s; }
.audio-btn:hover { background: var(--ink); color: var(--paper); }
.audio-btn.speaking { background: var(--accent); border-color: var(--accent); color: var(--paper); }

/* article buttons */
.art-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 22px; }
.art-btn { padding: 20px 0; border: 2px solid; font-family: var(--serif); font-size: 26px; font-weight: 500; transition: all 0.12s; }
.art-btn.der { border-color: var(--der); color: var(--der); }
.art-btn.die { border-color: var(--die); color: var(--die); }
.art-btn.das { border-color: var(--das); color: var(--das); }
.art-btn.der:hover { background: var(--der); color: #fff; }
.art-btn.die:hover { background: var(--die); color: #fff; }
.art-btn.das:hover { background: var(--das); color: #fff; }
.art-btn.chosen-correct { background: var(--green) !important; border-color: var(--green) !important; color: #fff !important; }
.art-btn.chosen-wrong { background: var(--die) !important; border-color: var(--die) !important; color: #fff !important; opacity: 0.85; }
.art-btn.reveal-correct { border-color: var(--green) !important; color: var(--green) !important; box-shadow: inset 0 0 0 2px var(--green); }
.art-btn:disabled { cursor: default; }

/* spelling */
.spell-input { width: 100%; max-width: 420px; padding: 16px 18px; border: 2px solid var(--ink); background: var(--paper-3); font-family: var(--serif); font-size: 26px; text-align: center; margin-top: 20px; }
.spell-input:focus { outline: none; border-color: var(--accent); }
.spell-input.correct { border-color: var(--green); background: rgba(74,124,58,0.08); }
.spell-input.wrong { border-color: var(--die); background: rgba(162,59,45,0.08); }
.feedback { font-family: var(--serif); font-size: 18px; margin-top: 16px; min-height: 26px; }
.feedback.ok { color: var(--green); }
.feedback.bad { color: var(--die); }
.feedback .correct-answer { font-style: italic; }
.spell-compare { margin-top: 18px; display: inline-block; text-align: left; }
.cmp-row { display: flex; gap: 14px; align-items: baseline; margin: 8px 0; }
.cmp-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--ink-soft); width: 100px; text-align: right; flex-shrink: 0; padding-top: 8px; }
.cmp-val { font-family: var(--serif); font-size: 26px; color: var(--ink); word-break: break-word; }
.diff-bad { background: rgba(162,59,45,0.18); color: var(--die); text-decoration: line-through; padding: 0 1px; border-radius: 2px; }
.diff-miss { background: rgba(74,124,58,0.22); color: var(--green); padding: 0 1px; border-radius: 2px; }
.spell-empty { color: var(--ink-soft); font-style: italic; font-size: 17px; font-family: var(--sans); }
.spell-note { font-size: 14px; color: var(--ink-soft); }
.cmp-ru { font-size: 13px; color: var(--ink-soft); margin-top: 10px; text-align: center; }

.card-actions { display: flex; gap: 10px; margin-top: 26px; justify-content: center; flex-wrap: wrap; }
.reveal-btn { background: var(--ink); color: var(--paper); padding: 13px 34px; font-size: 14px; }
.mark { padding: 13px 24px; font-size: 14px; border: 2px solid; min-width: 150px; transition: all 0.15s; }
.mark.wrong { border-color: var(--die); color: var(--die); } .mark.wrong:hover { background: var(--die); color: #fff; }
.mark.right { border-color: var(--green); color: var(--green); } .mark.right:hover { background: var(--green); color: #fff; }
.next-btn { background: var(--accent); color: var(--paper); border-color: var(--accent); padding: 13px 40px; font-size: 14px; }
.next-btn:hover { background: var(--accent-2); }
.kbd-hint { font-size: 11px; color: var(--ink-soft); margin-top: 18px; }

/* end */
.session-end { text-align: center; max-width: 460px; }
.end-score { font-family: var(--serif); font-size: 64px; font-weight: 300; color: var(--accent); line-height: 1; }
.end-msg { font-family: var(--serif); font-style: italic; font-size: 18px; color: var(--ink-soft); margin: 14px 0; }
.end-detail { font-size: 13px; color: var(--ink-soft); margin-bottom: 22px; line-height: 1.7; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--paper); padding: 12px 22px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
.toast.show { opacity: 1; }
.confirm-bg { position: fixed; inset: 0; background: rgba(28,26,23,0.6); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 16px; }
.confirm-box { background: var(--paper); border: 2px solid var(--ink); padding: 28px; max-width: 400px; text-align: center; }
.confirm-msg { font-family: var(--serif); font-size: 20px; margin-bottom: 22px; line-height: 1.4; }
.confirm-actions { display: flex; gap: 10px; justify-content: center; }

@media (max-width: 700px) {
  h1 { font-size: 34px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .wk-num { font-size: 34px; }
  .card-word { font-size: 40px; }
  .vocab-row { grid-template-columns: 1fr 1fr 30px; }
  .vocab-row .box-bar { display: none; }
}
</style>

/* ==========================================================================
   HELPERS
   ========================================================================== */
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function normalize(s){ return String(s).toLowerCase().trim().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss').replace(/\s+/g,' '); }

/* Character-level diff (LCS). Highlights extra/wrong chars in a, missing chars in b.
   Matching is case-insensitive so capitalization differences aren't flagged as errors. */
function diffChars(a, b){
  const A = [...a], B = [...b];
  const al = A.map(c=>c.toLowerCase()), bl = B.map(c=>c.toLowerCase());
  const m = A.length, n = B.length;
  const dp = Array.from({length:m+1}, ()=>new Array(n+1).fill(0));
  for (let i=m-1;i>=0;i--) for (let j=n-1;j>=0;j--){
    dp[i][j] = al[i]===bl[j] ? dp[i+1][j+1]+1 : Math.max(dp[i+1][j], dp[i][j+1]);
  }
  let i=0, j=0, aHtml='', bHtml='';
  while (i<m && j<n){
    if (al[i]===bl[j]){ aHtml+=esc(A[i]); bHtml+=esc(B[j]); i++; j++; }
    else if (dp[i+1][j] >= dp[i][j+1]){ aHtml+=`<span class="diff-bad">${esc(A[i])}</span>`; i++; }
    else { bHtml+=`<span class="diff-miss">${esc(B[j])}</span>`; j++; }
  }
  while (i<m){ aHtml+=`<span class="diff-bad">${esc(A[i])}</span>`; i++; }
  while (j<n){ bHtml+=`<span class="diff-miss">${esc(B[j])}</span>`; j++; }
  return { aHtml, bHtml };
}

function parseArticle(de){
  const m = de.match(/^(der|die|das)\s+(.+)$/);
  return m ? { article: m[1], core: m[2] } : null;
}
function availableModes(de){
  const modes = ['flashcard'];
  const art = parseArticle(de);
  if (art) modes.push('article');
  const core = art ? art.core : de;
  if (!/[\s?…—\/]/.test(core) && core.length >= 2) modes.push('spelling');
  return modes;
}
function deColored(de){
  const art = parseArticle(de);
  if (!art) return esc(de);
  return `<span class="art ${art.article}">${art.article}</span> ${esc(art.core)}`;
}

/* speech synthesis */
let GERMAN_VOICE = null;
function pickVoice(){
  if (!window.speechSynthesis) return;
  const vs = window.speechSynthesis.getVoices();
  GERMAN_VOICE = vs.find(v => /de[-_]/i.test(v.lang)) || vs.find(v => /german|deutsch/i.test(v.name)) || null;
}
if (window.speechSynthesis){
  pickVoice();
  window.speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text, btnEl){
  if (!window.speechSynthesis){ showToast('Озвучка не поддерживается в этом браузере'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE'; u.rate = 0.88; u.pitch = 1;
  if (GERMAN_VOICE) u.voice = GERMAN_VOICE;
  if (btnEl){ btnEl.classList.add('speaking'); u.onend = () => btnEl.classList.remove('speaking'); u.onerror = () => btnEl.classList.remove('speaking'); }
  window.speechSynthesis.speak(u);
}
function speakWord(week, idx, btnEl){
  const de = VOCAB[week].words[idx][0].split('—')[0].trim(); // strip Perfekt extra
  speak(de, btnEl);
}

/* ==========================================================================
   LEITNER SPACED REPETITION
   ========================================================================== */
const DAY = 86400000;
const BOX_INTERVAL = { 1: 1*DAY, 2: 2*DAY, 3: 4*DAY, 4: 8*DAY, 5: 16*DAY };
const MAX_BOX = 5;

function key(week, idx){ return week + '-' + idx; }
function getCard(week, idx){
  return state.mastery[key(week,idx)] || { box: 0, due: 0, right: 0, wrong: 0, seen: 0 };
}
function isDue(week, idx, now){
  const c = state.mastery[key(week,idx)];
  if (!c) return true;           // new = always available
  return c.due <= now;
}
function isSeen(week, idx){ const c = state.mastery[key(week,idx)]; return c && c.seen > 0; }
function cardBox(week, idx){ const c = state.mastery[key(week,idx)]; return c ? c.box : 0; }
function isMastered(week, idx){ return cardBox(week,idx) >= MAX_BOX; }

function updateCard(week, idx, correct){
  const c = getCard(week, idx);
  c.seen++;
  if (correct){ c.right++; c.box = Math.min(MAX_BOX, c.box + 1); }  // +1 box per correct (new 0→1)
  else { c.wrong++; c.box = 1; }                                    // a miss sends it back to box 1
  c.due = Date.now() + BOX_INTERVAL[c.box];
  state.mastery[key(week,idx)] = c;
  save();
}

function resetAll(){ askConfirm('Сбросить весь прогресс по словам? Все коробки обнулятся.', 'all'); }
function resetWord(week, idx){ askConfirm('Сбросить прогресс этого слова?', { week, idx }); }
function askConfirm(message, action){ state.confirm = { message, action }; render(); }
function confirmNo(){ state.confirm = null; render(); }
function confirmYes(){
  const a = state.confirm && state.confirm.action;
  state.confirm = null;
  if (a === 'all'){ state.mastery = {}; save(); render(); showToast('Прогресс сброшен'); }
  else if (a && typeof a === 'object'){ delete state.mastery[key(a.week, a.idx)]; save(); render(); showToast('Слово сброшено'); }
  else render();
}

let state = {
  selectedWeek: 1,
  mastery: {},
  modes: { flashcard: true, article: true, spelling: true },
  session: null,
};
const KEY = 'de-vocab-trainer-v2';

/* ---- SUPABASE CONFIG: замени на свои значения из Settings → API ---- */
const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
/* -------------------------------------------------------------------- */
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;

async function initApp() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    localStorage.setItem('auth_redirect', location.href);
    location.href = 'auth.html';
    return;
  }
  currentUser = session.user;

  // Load from localStorage first (fast)
  load();

  // Sync from cloud (overwrites local if cloud record exists)
  try {
    const { data } = await sb.from('progress')
      .select('vocab_data')
      .eq('user_id', session.user.id)
      .single();
    if (data && data.vocab_data) {
      applyData(data.vocab_data);
    }
  } catch(e) { /* offline or no record yet — localStorage is fine */ }

  render();
}

async function saveToCloud() {
  if (!currentUser) return;
  try {
    await sb.from('progress').upsert({
      user_id: currentUser.id,
      vocab_data: serialize(),
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id' });
  } catch(e) { /* ignore — localStorage is the fallback */ }
}
async function logout() {
  await sb.auth.signOut();
  location.href = 'auth.html';
}

function serialize(){
  return { app:'deutsch-vokabeltrainer', version:2, savedAt:new Date().toISOString(),
           selectedWeek: state.selectedWeek, modes: state.modes, mastery: state.mastery };
}
function applyData(d){
  if (!d || typeof d !== 'object' || !d.mastery || typeof d.mastery !== 'object'){
    showToast('Файл не похож на прогресс'); return false;
  }
  state.mastery = d.mastery;
  if (d.modes) state.modes = d.modes;
  if (d.selectedWeek) state.selectedWeek = d.selectedWeek;
  save(); render();
  return true;
}

function load(){
  try {
    const s = localStorage.getItem(KEY);
    if (s){
      const d = JSON.parse(s);
      state.selectedWeek = d.selectedWeek || 1;
      state.mastery = d.mastery || {};
      if (d.modes) state.modes = d.modes;
    }
  } catch(e){}
}
function save(){
  try { localStorage.setItem(KEY, JSON.stringify(serialize())); } catch(e){}
  if (fileHandle) writeToFile(); // auto-sync to linked file (fire-and-forget)
  saveToCloud(); // sync to Supabase (fire-and-forget)
}

/* ---- Manual export / import (works in every browser) ---- */
function exportProgress(){
  const blob = new Blob([JSON.stringify(serialize(), null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'deutsch-fortschritt.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  showToast('Файл прогресса скачан');
}
function importProgress(){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'application/json,.json';
  inp.onchange = () => {
    const file = inp.files && inp.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { try { if (applyData(JSON.parse(reader.result))) showToast('Прогресс загружен'); } catch(e){ showToast('Не удалось прочитать файл'); } };
    reader.readAsText(file);
  };
  inp.click();
}

  if (!fileHandle) return;

  } catch(e){ /* permission revoked or error — ignore */ }
}

    const text = await file.text();
    let ok = true;
    if (text.trim()){ try { ok = applyData(JSON.parse(text)); } catch(e){ ok = false; showToast('Файл повреждён'); } }
    if (ok){ fileHandle = h; await writeToFile(); render(); showToast('Файл подключён — автосохранение включено'); }
  } catch(e){ if (e && e.name !== 'AbortError') showToast('Автосинхронизация недоступна (откройте страницу через http)'); }
}

/* ==========================================================================
   STATS
   ========================================================================== */
function weekStats(week){
  const n = VOCAB[week].words.length;
  let mastered=0, learning=0, neu=0;
  for (let i=0;i<n;i++){
    if (isMastered(week,i)) mastered++;
    else if (isSeen(week,i)) learning++;
    else neu++;
  }
  return { total:n, mastered, learning, neu };
}
function globalStats(){
  const now = Date.now();
  let total=0, mastered=0, learning=0, due=0;
  for (const w in VOCAB){
    const words = VOCAB[w].words;
    for (let i=0;i<words.length;i++){
      total++;
      if (isMastered(w,i)) mastered++;
      else if (isSeen(w,i)) learning++;
      if (isSeen(w,i) && !isMastered(w,i) && isDue(w,i,now)) due++;
    }
  }
  return { total, mastered, learning, due };
}

/* ==========================================================================
   SESSION BUILDER
   ========================================================================== */
function pickMode(week, idx){
  const avail = availableModes(VOCAB[week].words[idx][0]);
  const enabled = avail.filter(m => state.modes[m]);
  const pool = enabled.length ? enabled : ['flashcard'];
  // light pedagogical nudge: higher box → prefer production (spelling)
  const box = cardBox(week, idx);
  if (box >= 3 && pool.includes('spelling') && Math.random() < 0.6) return 'spelling';
  if (box <= 1 && pool.includes('article') && Math.random() < 0.5) return 'article';
  return pool[Math.floor(Math.random()*pool.length)];
}

function makeCard(week, idx){
  const [de, ru] = VOCAB[week].words[idx];
  return { week, idx, de, ru, mode: pickMode(week, idx), requeued: false, firstTry: null };
}

function startSession(scope){
  const now = Date.now();
  let list = [];
  if (scope.type === 'week'){
    const words = VOCAB[scope.week].words;
    const due = [], neu = [];
    for (let i=0;i<words.length;i++){
      if (isMastered(scope.week,i) && !isDue(scope.week,i,now)) continue;
      if (isSeen(scope.week,i)){ if (isDue(scope.week,i,now)) due.push(i); }
      else neu.push(i);
    }
    // due review first, then up to 12 new
    list = due.map(i=>makeCard(scope.week,i)).concat(neu.slice(0,12).map(i=>makeCard(scope.week,i)));
    if (list.length === 0){ // nothing due & nothing new → review whole week
      list = words.map((_,i)=>makeCard(scope.week,i));
    }
  } else { // review-all due
    for (const w in VOCAB){
      const words = VOCAB[w].words;
      for (let i=0;i<words.length;i++){
        if (isSeen(w,i) && !isMastered(w,i) && isDue(w,i,now)) list.push(makeCard(+w,i));
      }
    }
  }
  // shuffle, cap 25
  list = list.sort(()=>Math.random()-0.5).slice(0,25);
  if (list.length === 0){ showToast('Нет слов для повторения — всё выучено!'); return; }

  state.session = { scope, queue: list, pos: 0, revealed: false, answered: false, lastCorrect: null, uniqueRight: 0, uniqueTotal: list.length, spellValue: '' };
  render();
}

function answer(correct){
  const s = state.session; if (!s) return;
  const card = s.queue[s.pos];
  if (card.firstTry === null){ card.firstTry = correct; if (correct) s.uniqueRight++; }
  updateCard(card.week, card.idx, correct);
  // re-queue wrong cards once (as easier flashcard)
  if (!correct && !card.requeued){
    s.queue.push({ ...card, mode: 'flashcard', requeued: true });
  }

  // Flashcard: translation is already shown, so advance straight away
  if (card.mode === 'flashcard'){ nextCard(); return; }

  // Article / Spelling: show feedback, wait for "Дальше"
  s.lastCorrect = correct;
  s.answered = true;
  s.revealed = true;
  render();
  // auto-speak after answering (reinforce pronunciation)
  setTimeout(()=>{ const b = document.getElementById('cardAudio'); speakWord(card.week, card.idx, b); }, 150);
}

function nextCard(){
  const s = state.session; if (!s) return;
  s.pos++;
  s.revealed = false; s.answered = false; s.lastCorrect = null; s.spellValue = '';
  render();
  setTimeout(()=>{ const inp = document.getElementById('spellInput'); if (inp) inp.focus(); }, 50);
}

function revealFlash(){
  state.session.revealed = true;
  render();
  const card = state.session.queue[state.session.pos];
  setTimeout(()=>{ const b = document.getElementById('cardAudio'); speakWord(card.week, card.idx, b); }, 120);
}

function submitSpelling(){
  const s = state.session; if (!s || s.answered) return;
  const card = s.queue[s.pos];
  const inp = document.getElementById('spellInput');
  const val = inp ? inp.value : '';
  s.spellValue = val;
  const art = parseArticle(card.de);
  const u = normalize(val);
  const full = normalize(card.de);
  let correct = false, note = '';
  if (u === full){ correct = true; }
  else if (art){
    const core = normalize(art.core);
    const noArt = u.replace(/^(der|die|das)\s+/,'');
    if (noArt === core){
      if (u === core){ correct = true; note = `почти — не забудь артикль: <span class="correct-answer">${art.article}</span>`; }
      else { correct = false; note = `корень верный, но артикль не тот`; }
    }
  }
  // accept "core correct but missing article" as correct-with-note
  if (!correct && art && normalize(art.core) === u){ correct = true; note = `верно, но с артиклем: <span class="correct-answer">${art.article} ${esc(art.core)}</span>`; }

  s.spellCorrect = correct; s.spellNote = note;
  answer(correct);
}

function closeSession(){ if (window.speechSynthesis) window.speechSynthesis.cancel(); state.session = null; render(); }

/* ==========================================================================
   RENDER — HOME
   ========================================================================== */
function render(){
  if (state.session){ renderSession(); return; }
  const g = globalStats();
  const week = state.selectedWeek;
  const wk = VOCAB[week];
  const ws = weekStats(week);

  let html = `
<header><div class="container">
  <div class="title-cat">Deutsch · A1 → B1</div>
  <h1>Vokabel<em>trainer</em></h1>
  <div class="subtitle">Карточки · артикли · написание · интервальное повторение</div>
  <div class="user-bar">
    <div class="nav-tabs">
      <a class="nav-tab" href="german_daily_planner.html">📅 Планнер</a>
      <a class="nav-tab active" href="german_vocab_trainer.html">🗂 Словарь</a>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="user-email">${esc(currentUser ? currentUser.email : '')}</span>
      <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
  </div>
</div></header>

<section class="container stats">
  <div><div class="stat-label">Всего слов</div><div class="stat-big num">${g.total}</div><div class="stat-sub">в программе</div></div>
  <div><div class="stat-label">Выучено</div><div class="stat-big green num">${g.mastered}</div><div class="stat-sub">${Math.round(g.mastered/g.total*100)}% · коробка 5</div></div>
  <div><div class="stat-label">Изучается</div><div class="stat-big num">${g.learning}</div><div class="stat-sub">в коробках 1–4</div></div>
  <div><div class="stat-label">Пора повторить</div><div class="stat-big accent num">${g.due}</div><div class="stat-sub">слов сегодня</div></div>
</section>

<main class="container">

  <div class="due-banner">
    <div class="due-banner-text">
      ${g.due > 0 ? `Пора повторить ${g.due} ${plural(g.due,'слово','слова','слов')}` : 'На сегодня всё повторено 🎉'}
      <small>${g.due > 0 ? 'Интервальное повторение — главное для долгой памяти' : 'Можно учить новые слова в любой неделе ниже'}</small>
    </div>
    <button class="btn on-dark big" onclick="startSession({type:'review-all'})" ${g.due===0?'disabled':''}>Повторить пору</button>
  </div>

  <div class="settings-bar">
    <span class="settings-label">Режимы в тренировке:</span>
    ${modeChip('flashcard','Карточки')}
    ${modeChip('article','Артикль der/die/das')}
    ${modeChip('spelling','Написание слова')}
  </div>

  <div class="settings-bar">
    <span class="settings-label">Прогресс между браузерами:</span>
    <button class="chip" onclick="exportProgress()">📤 Сохранить в файл</button>
    <button class="chip" onclick="importProgress()">📥 Загрузить из файла</button>
    ${FSA ? `
      <span style="width:1px;height:22px;background:var(--line)"></span>
      ${fileHandle
        ? `<span class="chip on" style="cursor:default"><span class="chip-check">✓</span>автосохранение в файл</span>`
        : `<button class="chip" onclick="createSyncFile()">🔗 Создать файл</button>
           <button class="chip" onclick="openSyncFile()">🔗 Открыть файл</button>`}
    ` : `<span class="sync-hint">Автосинхронизация — только если открыть страницу через http. При открытии файла используйте «Сохранить / Загрузить»; держите файл в облачной папке (Drive / Dropbox).</span>`}
  </div>

  <div class="week-tabs">
    <div class="tabs-label">
      <span class="uppercase-mini">Неделя</span>
      <span class="uppercase-mini">● зелёная = выучена · золотая = в работе</span>
    </div>
    <div class="tabs-grid">
      ${Object.keys(VOCAB).map(w=>{
        const s = weekStats(w);
        let dot = '';
        if (s.mastered === s.total) dot = '<span class="wt-dot" style="background:var(--green)"></span>';
        else if (s.mastered + s.learning > 0) dot = '<span class="wt-dot" style="background:var(--gold)"></span>';
        const cls = +w === week ? 'wt active' : 'wt';
        return `<button class="${cls}" onclick="selectWeek(${w})">${w}${dot}</button>`;
      }).join('')}

  <div class="wk-header">
    <div class="wk-num num">W${String(week).padStart(2,'0')}</div>
    <div class="wk-meta">
      <div class="wk-theme">${esc(wk.theme)}</div>
      <div class="wk-count">${ws.total} слов · выучено ${ws.mastered} · в работе ${ws.learning} · новых ${ws.neu}</div>
    </div>
    <button class="btn accent big" onclick="startSession({type:'week',week:${week}})">Тренировать неделю ${week}</button>
  </div>

  <div class="vocab-list">
    ${wk.words.map((w,i)=>{
      const box = cardBox(week,i);
      const mastered = box >= MAX_BOX;
      const segs = [1,2,3,4,5].map(b=>`<div class="box-seg ${b<=box?'fill':''} ${b<=box&&mastered?'full':''}"></div>`).join('');
      return `<div class="vocab-row ${mastered?'mastered':''}">
        <div class="vocab-de">${deColored(w[0])}</div>
        <div class="vocab-ru">${esc(w[1])}</div>
        <button class="box-bar" onclick="resetWord(${week},${i})" title="Коробка ${box} из 5 · нажми, чтобы сбросить это слово">${segs}</button>
        <button class="mini-audio" onclick="speakWord(${week},${i},this)" title="Произношение">🔊</button>
      </div>`;
    }).join('')}
  </div>

  <div class="info-box">
    <b>Как считается прогресс.</b> У каждого слова 5 коробок (это кубики рядом). Новое слово — 0 кубиков. Каждый правильный ответ поднимает на одну коробку и откладывает повтор дальше: <b>1 → 2 → 4 → 8 → 16 дней</b>. Ошибка возвращает слово в первую коробку. <b>Коробка 5 = выучено</b> (нужно 5 правильных ответов подряд). Каждый день жми «Повторить пору» — это и есть закрепление. Чтобы сбросить прогресс одного слова, нажми на его кубики; сбросить всё — кнопка внизу.
  </div>
</main>

<footer><div class="container f-row">
  <span>Прогресс синхронизируется с облаком · озвучка — синтезатор речи системы</span>

</div></footer>`;

  if (state.confirm){
    html += `
<div class="confirm-bg" onclick="if(event.target===this)confirmNo()">
  <div class="confirm-box">
    <div class="confirm-msg">${esc(state.confirm.message)}</div>
    <div class="confirm-actions">
      <button class="btn" onclick="confirmNo()">Отмена</button>
      <button class="btn accent" onclick="confirmYes()">Сбросить</button>
    </div>
  </div>
</div>`;
  }

  document.getElementById('app').innerHTML = html;
}

function plural(n,one,few,many){
  const m10=n%10, m100=n%100;
  if (m10===1 && m100!==11) return one;
  if (m10>=2 && m10<=4 && (m100<10||m100>=20)) return few;
  return many;
}
function modeChip(mode,label){
  const on = state.modes[mode];
  return `<button class="chip ${on?'on':''}" onclick="toggleMode('${mode}')"><span class="chip-check">${on?'✓':''}</span>${label}</button>`;
}
function toggleMode(mode){
  // keep at least one mode on
  const others = Object.keys(state.modes).filter(m=>m!==mode).some(m=>state.modes[m]);
  if (state.modes[mode] && !others){ showToast('Хотя бы один режим должен быть включён'); return; }
  state.modes[mode] = !state.modes[mode]; save(); render();
}
function selectWeek(w){ state.selectedWeek = +w; save(); render(); }

/* ==========================================================================
   RENDER — SESSION
   ========================================================================== */
function renderSession(){
  const s = state.session;
  if (s.pos >= s.queue.length){ renderEnd(); return; }
  const card = s.queue[s.pos];
  const progress = (s.pos / s.queue.length) * 100;
  const modeLabel = { flashcard:'Карточка', article:'Артикль', spelling:'Написание' }[card.mode];

  let bodyHtml = '';
  if (card.mode === 'flashcard') bodyHtml = renderFlashcard(card, s);
  else if (card.mode === 'article') bodyHtml = renderArticle(card, s);
  else bodyHtml = renderSpelling(card, s);

  document.getElementById('app').innerHTML = `
<div class="session-bg">
  <div class="session-top"><div class="container session-top-row">
    <span class="session-mode-badge ${card.mode}">${modeLabel}</span>
    <span class="session-counter">${s.pos+1} / ${s.queue.length}${s.scope.type==='review-all'?' · повторение':' · неделя '+s.scope.week}</span>
    <button class="session-close" onclick="closeSession()">×</button>
  </div>
  <div class="container"><div class="session-progress"><div class="session-progress-fill" style="width:${progress}%"></div></div></div>
  </div>
  <div class="session-body"><div class="card">${bodyHtml}</div></div>
</div>`;

  if (card.mode === 'spelling' && !s.answered){
    setTimeout(()=>{ const inp = document.getElementById('spellInput'); if (inp){ inp.focus(); inp.value = s.spellValue||''; } }, 30);
  }
}

function renderFlashcard(card, s){
  return `
    <div class="card-prompt-label">Что это значит?</div>
    <button class="audio-btn" id="cardAudio" onclick="speakWord(${card.week},${card.idx},this)">🔊</button>
    <div class="card-word">${deColored(card.de)}</div>
    <div class="card-sub">${s.revealed ? esc(card.ru) : '&nbsp;'}</div>
    <div class="card-actions">
      ${!s.revealed
        ? `<button class="reveal-btn" onclick="revealFlash()">Показать перевод</button>`
        : `<button class="mark wrong" onclick="answer(false)">Не знал</button>
           <button class="mark right" onclick="answer(true)">Знал</button>`}
    </div>
    <div class="kbd-hint">Space — показать · 1/← не знал · 2/→ знал</div>`;
}

function renderArticle(card, s){
  const art = parseArticle(card.de);
  const arts = ['der','die','das'];
  let btns = arts.map(a=>{
    let cls = 'art-btn ' + a;
    if (s.answered){
      if (a === s.chosenArticle){
        // the button the user pressed: solid fill, white letter
        cls += (a === art.article) ? ' chosen-correct' : ' chosen-wrong';
      } else if (a === art.article){
        // user picked the wrong one — outline the correct answer
        cls += ' reveal-correct';
      }
    }
    return `<button class="${cls}" ${s.answered?'disabled':''} onclick="chooseArticle('${a}')">${a}</button>`;
  }).join('');
  return `
    <div class="card-prompt-label">Какой артикль?</div>
    <div class="card-word">${esc(art.core)}</div>
    <div class="art-btns">${btns}</div>
    ${s.answered ? `
      <div class="feedback ${s.lastCorrect?'ok':'bad'}">
        ${s.lastCorrect ? '✓ Верно!' : '✗ Правильно:'} <span class="correct-answer"><span class="art ${art.article}" style="font-weight:600">${art.article}</span> ${esc(art.core)}</span> — ${esc(card.ru)}
      </div>
      <button class="audio-btn" id="cardAudio" onclick="speakWord(${card.week},${card.idx},this)" style="margin-top:8px">🔊</button>
      <div class="card-actions"><button class="next-btn" onclick="nextCard()">Дальше →</button></div>
      <div class="kbd-hint">Enter — дальше</div>
    ` : `<div class="kbd-hint">1 — der · 2 — die · 3 — das</div>`}`;
}
function chooseArticle(a){
  const s = state.session; if (s.answered) return;
  const card = s.queue[s.pos];
  const art = parseArticle(card.de);
  s.chosenArticle = a;
  answer(a === art.article);
}

function renderSpelling(card, s){
  let answeredBlock = '';
  if (s.answered){
    const userRaw = (s.spellValue || '').trim();
    if (s.spellCorrect){
      answeredBlock = `
        <div class="feedback ok">✓ Верно — <span class="correct-answer">${deColored(card.de)}</span>
          ${s.spellNote ? '<br><span class="spell-note">'+s.spellNote+'</span>' : ''}
        </div>`;
    } else {
      const d = diffChars(userRaw, card.de);
      const userShow = userRaw ? `<span class="cmp-val">${d.aHtml}</span>` : '<span class="spell-empty">(ничего не введено)</span>';
      answeredBlock = `
        <div class="spell-compare">
          <div class="cmp-row"><span class="cmp-label">Твой ответ</span>${userShow}</div>
          <div class="cmp-row"><span class="cmp-label">Правильно</span><span class="cmp-val">${d.bHtml}</span></div>
          <div class="cmp-ru">${esc(card.ru)}</div>
        </div>`;
    }
  }
  return `
    <div class="card-prompt-label">Напиши по-немецки</div>
    <div class="card-word" style="font-size:40px">${esc(card.ru)}</div>
    <div><input class="spell-input ${s.answered ? (s.spellCorrect?'correct':'wrong') : ''}" id="spellInput"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      ${s.answered ? `disabled value="${esc(s.spellValue||'')}"` : ''} placeholder="der … / …"
      onkeydown="if(event.key==='Enter'){event.preventDefault(); ${s.answered?'nextCard()':'submitSpelling()'}}"></div>
    ${s.answered ? `
      ${answeredBlock}
      <button class="audio-btn" id="cardAudio" onclick="speakWord(${card.week},${card.idx},this)" style="margin-top:8px">🔊</button>
      <div class="card-actions"><button class="next-btn" onclick="nextCard()">Дальше →</button></div>
    ` : `
      <div class="card-actions"><button class="reveal-btn" onclick="submitSpelling()">Проверить</button></div>
      <div class="kbd-hint">ä=ae, ö=oe, ü=ue, ß=ss принимаются · Enter — проверить</div>
    `}`;
}

function renderEnd(){
  const s = state.session;
  const pct = s.uniqueTotal ? Math.round(s.uniqueRight / s.uniqueTotal * 100) : 0;
  let msg = 'Готово!';
  if (pct === 100) msg = 'Безупречно! Все слова с первого раза.';
  else if (pct >= 80) msg = 'Отличный результат!';
  else if (pct >= 60) msg = 'Неплохо — слова с ошибками вернутся раньше.';
  else msg = 'Эти слова ещё в работе. Они скоро повторятся.';

  document.getElementById('app').innerHTML = `
<div class="session-bg">
  <div class="session-body"><div class="session-end">
    <div class="card-prompt-label">Тренировка завершена</div>
    <div class="end-score num">${s.uniqueRight}<span style="font-size:24px;color:var(--ink-soft)">/${s.uniqueTotal}</span></div>
    <div class="end-msg">${msg}</div>
    <div class="end-detail">${pct}% слов с первого раза · всего показов: ${s.queue.length}<br>Слова с ошибками опустились в коробку 1 и вернутся в ближайшие дни.</div>
    <button class="btn primary big" onclick="closeSession()">Готово</button>
    <button class="btn big" style="margin-left:8px" onclick='startSession(${JSON.stringify(s.scope)})'>Ещё раз</button>
  </div></div>
</div>`;
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

/* ==========================================================================
   KEYBOARD
   ========================================================================== */
document.addEventListener('keydown', e=>{
  const s = state.session; if (!s) return;
  if (s.pos >= s.queue.length){ if (e.key==='Escape') closeSession(); return; }
  if (e.key === 'Escape'){ closeSession(); return; }
  const card = s.queue[s.pos];
  if (e.target.id === 'spellInput') return; // let typing through

  if (card.mode === 'flashcard'){
    if (e.key === ' '){ e.preventDefault(); if(!s.revealed) revealFlash(); }
    else if (s.revealed){ if (e.key==='1'||e.key==='ArrowLeft') answer(false); else if (e.key==='2'||e.key==='ArrowRight') answer(true); }
  } else if (card.mode === 'article'){
    if (s.answered){ if (e.key==='Enter') nextCard(); }
    else { if (e.key==='1') chooseArticle('der'); else if (e.key==='2') chooseArticle('die'); else if (e.key==='3') chooseArticle('das'); }
  } else if (card.mode === 'spelling'){
    if (s.answered && e.key==='Enter') nextCard();
  }
});

/* ==========================================================================
   INIT
   ========================================================================== */
initApp();
</script>
